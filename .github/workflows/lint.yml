name: lint

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  ruff:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install ruff
        run: pip install --quiet ruff
      - name: Run ruff
        # Reads config from pyproject.toml (target Python 3.10, F401/F811/F841,
        # per-file-ignores for known compatibility shims). Failing here means a
        # new PR introduced unused imports / dead variables — fix the diff or
        # tag intentional re-exports with `# noqa: F401  re-exported`.
        run: ruff check .
