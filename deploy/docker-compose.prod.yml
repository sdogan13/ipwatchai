version: '3.8'

services:
  # ==========================================
  # Redis - Production overrides
  # ==========================================
  redis:
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"

  # ==========================================
  # PostgreSQL - Enabled (no profile restriction)
  # ==========================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ipwatch_postgres
    restart: unless-stopped
    profiles: []  # Override: always start (remove with-db profile)
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-turk_patent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-trademark_db}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/initdb/01-init.sh:/docker-entrypoint-initdb.d/01-init.sh:ro
      - ./deploy/initdb/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U turk_patent -d trademark_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ipwatch_network

  # ==========================================
  # Backend - Production overrides
  # ==========================================
  backend:
    restart: unless-stopped
    env_file:
      - deploy/.env.prod
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: trademark_db
      DB_USER: turk_patent
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      AI_DEVICE: ${AI_DEVICE:-cpu}
      USE_FP16: ${USE_FP16:-false}
      USE_TF32: ${USE_TF32:-false}
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY}
    volumes:
      - uploads_data:/app/uploads
      - generated_logos:/app/uploads/generated/logos
      - reports_data:/app/reports
      - logs_data:/app/logs
      - model_cache:/root/.cache/huggingface
      - torch_cache:/root/.cache/torch
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices: []  # Override: no GPU reservation by default (overridden by gpu profile)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 180s

  # ==========================================
  # Nginx - Production: listen on all interfaces
  # ==========================================
  nginx:
    restart: unless-stopped
    volumes:
      - ./deploy/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
    ports:
      - "0.0.0.0:80:80"
    depends_on:
      backend:
        condition: service_healthy

  # ==========================================
  # Caddy Reverse Proxy (alternative to nginx)
  # ==========================================
  caddy:
    image: caddy:2-alpine
    container_name: ipwatch_caddy
    restart: unless-stopped
    profiles: ["with-caddy"]
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ipwatch_network

  # ==========================================
  # Cloudflared - disabled in prod (use nginx directly)
  # ==========================================
  cloudflared:
    profiles: ["with-tunnel"]

networks:
  ipwatch_network:
    driver: bridge
    name: ipwatch_network

volumes:
  postgres_data:
    name: ipwatch_postgres_data
  redis_data:
    name: ipwatch_redis_data
  uploads_data:
    name: ipwatch_uploads
  reports_data:
    name: ipwatch_reports
  logs_data:
    name: ipwatch_logs
  generated_logos:
    name: ipwatch_generated_logos
  nginx_logs:
    name: ipwatch_nginx_logs
  model_cache:
    name: ipwatch_model_cache
  torch_cache:
    name: ipwatch_torch_cache
  caddy_data:
    name: ipwatch_caddy_data
  caddy_config:
    name: ipwatch_caddy_config
