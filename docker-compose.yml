# ============================================
# IP Watch AI - Docker Compose Configuration
# https://ipwatchai.com
# ============================================
#
# Prerequisites:
# - Docker Desktop with WSL2 backend
# - NVIDIA Container Toolkit installed
# - Cloudflare tunnel credentials in ./cloudflared/
#
# Usage:
#   docker-compose up -d              # Start all services
#   docker-compose logs -f backend    # View backend logs
#   docker-compose down               # Stop all services
#
# For development with pgAdmin:
#   docker-compose --profile dev up -d
#
# ============================================

services:
  # ==========================================
  # Redis Cache & Message Broker
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: ipwatch_redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 4gb
      --maxmemory-policy allkeys-lru
      ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ${REDIS_PASSWORD:+-a $REDIS_PASSWORD --no-auth-warning} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ipwatch_network

  # ==========================================
  # FastAPI Backend with GPU Support
  # ==========================================
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ipwatch_backend
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      # Application
      APP_NAME: "IP Watch AI"
      APP_VERSION: "1.0.0"
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DEBUG: ${DEBUG:-false}
      HOST: "0.0.0.0"
      PORT: "8000"
      WORKERS: ${WORKERS:-4}

      # Database - Always use Docker network hostname (not host .env values)
      DB_HOST: "postgres"
      DB_PORT: "5432"
      DB_NAME: "${DB_NAME:-trademark_db}"
      DB_USER: "${DB_USER:-turk_patent}"
      DB_PASSWORD: "${DB_PASSWORD}"

      # Redis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD:-}"
      REDIS_URL: "redis://${REDIS_PASSWORD:+:${REDIS_PASSWORD}@}redis:6379/0"

      # Auth
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY:?AUTH_SECRET_KEY is required}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}

      # AI Settings
      AI_DEVICE: "${AI_DEVICE:-cuda}"
      USE_FP16: "${USE_FP16:-true}"
      USE_TF32: "${USE_TF32:-true}"
      CLIP_BATCH_SIZE: "${CLIP_BATCH_SIZE:-64}"
      DINO_BATCH_SIZE: "${DINO_BATCH_SIZE:-32}"
      TEXT_BATCH_SIZE: "${TEXT_BATCH_SIZE:-256}"

      # Model cache paths (Linux paths inside container, override Windows .env values)
      TORCH_HOME: "/root/.cache/torch"
      HF_HOME: "/root/.cache/huggingface"
      EASYOCR_MODULE_PATH: "/root/.EasyOCR"

      # Creative Suite (Gemini AI)
      CREATIVE_GOOGLE_API_KEY: ${CREATIVE_GOOGLE_API_KEY:-}

      # CORS
      CORS_ORIGINS: '${CORS_ORIGINS:-["https://ipwatchai.com","https://www.ipwatchai.com"]}'

      # Paths (inside container)
      DATA_ROOT: "/app/bulletins/Marka"
      UPLOAD_DIR: "/app/uploads"
      REPORT_DIR: "/app/reports"
      LOG_DIR: "/app/logs"
    volumes:
      # Mount existing data directories from host
      - ${DATA_PATH:-C:/Users/701693/turk_patent/bulletins}:/app/bulletins
      - ${CLIENTS_PATH:-C:/Users/701693/turk_patent/clients}:/app/clients
      - ./models:/app/models:ro
      - uploads_data:/app/uploads
      - generated_logos:/app/uploads/generated/logos
      - reports_data:/app/reports
      - logs_data:/app/logs
      # Mount model cache for faster startup (rw so container can update cache)
      - ${HF_HOME:-C:/Users/701693/.cache/huggingface}:/root/.cache/huggingface
      - ${TORCH_HOME:-C:/Users/701693/.cache/torch}:/root/.cache/torch
      - ${EASYOCR_HOME:-C:/Users/701693/.EasyOCR}:/root/.EasyOCR
      - playwright_cache:/root/.cache/ms-playwright
      # Mount main.py for hot-reloading code changes
      - ./main.py:/app/main.py:ro
      - ./scrapper.py:/app/scrapper.py:ro
      # Mount templates and static for landing page development
      - ./templates:/app/templates:ro
      - ./static:/app/static:ro
      - ./static/avatars:/app/static/avatars
      - ./agentic_search.py:/app/agentic_search.py:ro
      - ./risk_engine.py:/app/risk_engine.py:ro
      - ./idf_scoring.py:/app/idf_scoring.py:ro
      - ./ai.py:/app/ai.py:ro
      # Mount API and database modules for development
      - ./api:/app/api:ro
      - ./database:/app/database:ro
      - ./auth:/app/auth:ro
      - ./config:/app/config:ro
      - ./utils:/app/utils:ro
      - ./notifications:/app/notifications:ro
      - ./migrations:/app/migrations:ro
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 600s
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - ipwatch_network

  # ==========================================
  # Nginx Reverse Proxy
  # ==========================================
  nginx:
    image: nginx:alpine
    container_name: ipwatch_nginx
    restart: unless-stopped
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_logs:/var/log/nginx
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - ipwatch_network

  # ==========================================
  # Cloudflare Tunnel (HTTPS via Cloudflare)
  # ==========================================
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: ipwatch_tunnel
    restart: unless-stopped
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - ./cloudflared:/etc/cloudflared:ro
    depends_on:
      - nginx
    networks:
      - ipwatch_network

  # ==========================================
  # PostgreSQL with pgvector
  # ==========================================
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ipwatch_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: turk_patent
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
      POSTGRES_DB: trademark_db
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deploy/schema.sql:/docker-entrypoint-initdb.d/02-schema.sql:ro
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U turk_patent -d trademark_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ipwatch_network

  # ==========================================
  # Background Worker (Watchlist Scanner)
  # ==========================================
  worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ipwatch_worker
    restart: unless-stopped
    profiles: ["with-worker"]  # Only start with: docker-compose --profile with-worker up
    command: ["python", "-m", "watchlist.scanner", "--daemon"]
    environment:
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-trademark_db}
      DB_USER: ${DB_USER:-turk_patent}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      AI_DEVICE: "${AI_DEVICE:-cuda}"
      USE_FP16: "${USE_FP16:-true}"
    volumes:
      - ${DATA_PATH:-C:/Users/701693/turk_patent/bulletins}:/app/bulletins:ro
      - ${HF_HOME:-C:/Users/701693/.cache/huggingface}:/root/.cache/huggingface:ro
      - ${TORCH_HOME:-C:/Users/701693/.cache/torch}:/root/.cache/torch:ro
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - ipwatch_network

  # ==========================================
  # Pipeline Worker (Weekly data pipeline)
  # ==========================================
  pipeline-worker:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ipwatch_pipeline_worker
    restart: unless-stopped
    profiles: ["with-worker"]
    command: ["python", "-m", "workers.pipeline_scheduler"]
    environment:
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-trademark_db}
      DB_USER: ${DB_USER:-turk_patent}
      DB_PASSWORD: ${DB_PASSWORD}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      AI_DEVICE: "${AI_DEVICE:-cuda}"
      USE_FP16: "${USE_FP16:-true}"
      USE_TF32: "${USE_TF32:-true}"
      PIPELINE_BULLETINS_ROOT: "/app/bulletins/Marka"
      PIPELINE_HEADLESS_BROWSER: "true"
      PIPELINE_EMBEDDING_BATCH_SIZE: "64"
      PIPELINE_SKIP_IF_EMBEDDINGS_EXIST: "true"
    volumes:
      # Read-write access to bulletins (download + extract + metadata + embeddings)
      - ${DATA_PATH:-C:/Users/701693/turk_patent/bulletins}:/app/bulletins
      - ${HF_HOME:-C:/Users/701693/.cache/huggingface}:/root/.cache/huggingface:ro
      - ${TORCH_HOME:-C:/Users/701693/.cache/torch}:/root/.cache/torch:ro
      - logs_data:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - ipwatch_network

  # ==========================================
  # Credit Reset Worker (Monthly logo credits)
  # ==========================================
  credit-reset:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ipwatch_credit_reset
    restart: unless-stopped
    profiles: ["with-worker"]
    command: ["python", "-m", "workers.credit_reset", "--daemon"]
    environment:
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-trademark_db}
      DB_USER: ${DB_USER:-turk_patent}
      DB_PASSWORD: ${DB_PASSWORD}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - ipwatch_network

  # ==========================================
  # pgAdmin (Development Only)
  # ==========================================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: ipwatch_pgadmin
    profiles: ["dev"]
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@ipwatchai.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "127.0.0.1:5050:80"
    networks:
      - ipwatch_network

  # ==========================================
  # Redis Commander (Development Only)
  # ==========================================
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: ipwatch_redis_ui
    profiles: ["dev"]
    environment:
      - REDIS_HOSTS=local:redis:6379${REDIS_PASSWORD:+:${REDIS_PASSWORD}}
    ports:
      - "127.0.0.1:8081:8081"
    depends_on:
      - redis
    networks:
      - ipwatch_network

# ==========================================
# Networks
# ==========================================
networks:
  ipwatch_network:
    driver: bridge
    name: ipwatch_network

# ==========================================
# Volumes
# ==========================================
volumes:
  postgres_data:
    name: ipwatch_postgres_data
  redis_data:
    name: ipwatch_redis_data
  uploads_data:
    name: ipwatch_uploads
  reports_data:
    name: ipwatch_reports
  logs_data:
    name: ipwatch_logs
  generated_logos:
    name: ipwatch_generated_logos
  nginx_logs:
    name: ipwatch_nginx_logs
  playwright_cache:
    name: ipwatch_playwright_cache
