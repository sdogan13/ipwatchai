<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - IP WATⒸH AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen" x-data="adminPanel()" x-init="init()">

    <!-- Top bar -->
    <header class="bg-white border-b border-gray-200 px-3 sm:px-6 py-3 flex items-center justify-between sticky top-0 z-50">
        <div class="flex items-center gap-2 sm:gap-4">
            <!-- Mobile sidebar toggle -->
            <button @click="sidebarOpen = !sidebarOpen"
                    class="md:hidden p-2 rounded-lg hover:bg-gray-100 min-h-[44px] min-w-[44px] flex items-center justify-center" aria-label="Toggle sidebar">
                <svg class="w-5 h-5 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
            </button>
            <a href="/dashboard" class="text-gray-500 hover:text-gray-700 text-sm flex items-center gap-1">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
                <span class="hidden sm:inline">Dashboard</span>
            </a>
            <div class="flex items-center gap-2">
                <img src="/static/icons/logo.jpeg" alt="IP WATⒸH AI" class="h-8 w-8 rounded-lg flex-shrink-0 object-cover">
                <h1 class="text-base sm:text-lg font-bold text-gray-900 whitespace-nowrap">Admin Panel</h1>
            </div>
        </div>
        <div class="flex items-center gap-2 sm:gap-3">
            <span class="text-sm text-gray-500 hidden sm:inline" x-text="currentUser?.email"></span>
            <span class="px-2 py-1 bg-red-100 text-red-700 text-xs font-medium rounded">SUPERADMIN</span>
        </div>
    </header>

    <div class="flex min-h-[calc(100vh-57px)] relative">

        <!-- Mobile sidebar backdrop -->
        <div x-show="sidebarOpen" x-cloak
             @click="sidebarOpen = false"
             class="fixed inset-0 bg-black/40 z-30 md:hidden"
             x-transition:enter="transition-opacity ease-out duration-200"
             x-transition:enter-start="opacity-0"
             x-transition:enter-end="opacity-100"
             x-transition:leave="transition-opacity ease-in duration-150"
             x-transition:leave-start="opacity-100"
             x-transition:leave-end="opacity-0"></div>

        <!-- Sidebar Navigation -->
        <nav :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full md:translate-x-0'"
             class="fixed md:static inset-y-0 left-0 top-[57px] z-40 w-56 bg-white border-r border-gray-200 p-4 flex-shrink-0 transform transition-transform duration-200 ease-in-out overflow-y-auto">
            <ul class="space-y-1">
                <template x-for="tab in tabs" :key="tab.id">
                    <li>
                        <button
                            @click="activeTab = tab.id; sidebarOpen = false"
                            :class="activeTab === tab.id
                                ? 'bg-indigo-50 text-indigo-700 font-medium'
                                : 'text-gray-600 hover:bg-gray-50'"
                            class="w-full text-left px-3 py-2.5 rounded-lg text-sm flex items-center gap-2 transition min-h-[44px]"
                        >
                            <span x-text="tab.icon" class="w-5 text-center"></span>
                            <span x-text="tab.label"></span>
                        </button>
                    </li>
                </template>
            </ul>
        </nav>

        <!-- Main Content Area -->
        <main class="flex-1 p-3 sm:p-6 overflow-auto w-full min-w-0">

            <div x-show="!authorized" x-cloak class="flex items-center justify-center h-64">
                <div class="text-gray-500">Verifying access...</div>
            </div>

            <template x-if="authorized">
                <div>
                    <!-- Overview -->
                    <div x-show="activeTab === 'overview'" x-cloak>
                        <div x-data="adminOverview()" x-init="load()">
                            {% include 'admin/partials/_overview.html' %}
                        </div>
                    </div>

                    <!-- Organizations -->
                    <div x-show="activeTab === 'organizations'" x-cloak>
                        <div x-data="adminOrganizations()" x-init="load()">
                            {% include 'admin/partials/_organizations.html' %}
                        </div>
                    </div>

                    <!-- Users -->
                    <div x-show="activeTab === 'users'" x-cloak>
                        <div x-data="adminUsers()" x-init="load()">
                            {% include 'admin/partials/_users.html' %}
                        </div>
                    </div>

                    <!-- Plans & Limits -->
                    <div x-show="activeTab === 'plans'" x-cloak>
                        <div x-data="adminPlans()" x-init="load()">
                            {% include 'admin/partials/_plans.html' %}
                        </div>
                    </div>

                    <!-- Credits -->
                    <div x-show="activeTab === 'credits'" x-cloak>
                        <div x-data="adminCredits()" x-init="load()">
                            {% include 'admin/partials/_credits.html' %}
                        </div>
                    </div>

                    <!-- Discount Codes -->
                    <div x-show="activeTab === 'discounts'" x-cloak>
                        <div x-data="adminDiscounts()" x-init="load()">
                            {% include 'admin/partials/_discounts.html' %}
                        </div>
                    </div>

                    <!-- Rate Limits -->
                    <div x-show="activeTab === 'rate_limits'" x-cloak>
                        <div x-data="adminRateLimits()" x-init="load()">
                            {% include 'admin/partials/_rate_limits.html' %}
                        </div>
                    </div>

                    <!-- Feature Flags -->
                    <div x-show="activeTab === 'features'" x-cloak>
                        <div x-data="adminFeatures()" x-init="load()">
                            {% include 'admin/partials/_features.html' %}
                        </div>
                    </div>

                    <!-- Analytics -->
                    <div x-show="activeTab === 'analytics'" x-cloak>
                        <div x-data="adminAnalytics()" x-init="load()">
                            {% include 'admin/partials/_analytics.html' %}
                        </div>
                    </div>

                    <!-- Audit Log -->
                    <div x-show="activeTab === 'audit'" x-cloak>
                        <div x-data="adminAuditLog()" x-init="load()">
                            {% include 'admin/partials/_audit_log.html' %}
                        </div>
                    </div>

                    <!-- Settings -->
                    <div x-show="activeTab === 'settings'" x-cloak>
                        <div x-data="adminSettings()" x-init="load()">
                            {% include 'admin/partials/_settings.html' %}
                        </div>
                    </div>
                </div>
            </template>

        </main>
    </div>

    <!-- Toast container -->
    <div id="admin-toast-container" class="fixed bottom-4 left-3 right-3 sm:left-auto sm:right-4 z-50 flex flex-col gap-2"></div>

    <script src="/static/js/admin.js"></script>
</body>
</html>
