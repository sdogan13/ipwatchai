<div class="flex items-center justify-between mb-4">
    <h2 class="text-lg font-semibold text-gray-900">Usage Analytics</h2>
    <div class="flex items-center gap-3">
        <select x-model.number="days" @change="load()" class="px-3 py-2 border border-gray-300 rounded-lg text-sm">
            <option value="7">Last 7 days</option>
            <option value="30">Last 30 days</option>
            <option value="90">Last 90 days</option>
        </select>
        <button @click="exportCsv()" class="px-4 py-2 bg-green-600 text-white text-sm rounded-lg hover:bg-green-700 flex items-center gap-1">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
            Export CSV
        </button>
    </div>
</div>

<template x-if="loading">
    <div class="flex items-center gap-2 text-gray-500 py-8">
        <svg class="animate-spin h-5 w-5" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
        Loading...
    </div>
</template>

<template x-if="!loading && data">
    <div class="space-y-6">
        <!-- Summary cards -->
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="bg-white rounded-lg border border-gray-200 p-4">
                <div class="text-xs text-gray-500">Total Searches</div>
                <div class="text-2xl font-bold" x-text="totalSearches.toLocaleString()"></div>
            </div>
            <div class="bg-white rounded-lg border border-gray-200 p-4">
                <div class="text-xs text-gray-500">Logo Generations</div>
                <div class="text-2xl font-bold" x-text="(data.cost_bearing_actions?.logo_generations || 0).toLocaleString()"></div>
            </div>
            <div class="bg-white rounded-lg border border-gray-200 p-4">
                <div class="text-xs text-gray-500">Name Generations</div>
                <div class="text-2xl font-bold" x-text="(data.cost_bearing_actions?.name_generations || 0).toLocaleString()"></div>
            </div>
            <div class="bg-white rounded-lg border border-gray-200 p-4">
                <div class="text-xs text-gray-500">Unique Users</div>
                <div class="text-2xl font-bold" x-text="data.daily_usage?.length ? data.daily_usage.reduce((s,d) => s + (d.unique_users || 0), 0) : 0"></div>
            </div>
        </div>

        <!-- Charts row -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">
            <!-- Line chart -->
            <div class="bg-white rounded-lg border border-gray-200 p-4 lg:col-span-2">
                <h3 class="text-sm font-medium text-gray-700 mb-3">Daily Usage</h3>
                <canvas id="admin-usage-chart" height="200"></canvas>
            </div>
            <!-- Pie chart -->
            <div class="bg-white rounded-lg border border-gray-200 p-4">
                <h3 class="text-sm font-medium text-gray-700 mb-3">Usage by Plan</h3>
                <canvas id="admin-plan-chart" height="200"></canvas>
            </div>
        </div>

        <!-- Top users table -->
        <div class="bg-white rounded-lg border border-gray-200 overflow-hidden">
            <div class="px-4 py-3 bg-gray-50">
                <h3 class="text-sm font-medium text-gray-700">Top 20 Users by Search Volume</h3>
            </div>
            <table class="w-full text-sm">
                <thead class="text-left">
                    <tr class="border-b">
                        <th class="px-4 py-2 font-medium text-gray-600">#</th>
                        <th class="px-4 py-2 font-medium text-gray-600">User</th>
                        <th class="px-4 py-2 font-medium text-gray-600">Organization</th>
                        <th class="px-4 py-2 font-medium text-gray-600 text-right">Searches</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-100">
                    <template x-for="(user, idx) in (data.top_users || [])" :key="user.email">
                        <tr class="hover:bg-gray-50">
                            <td class="px-4 py-2 text-gray-400" x-text="idx + 1"></td>
                            <td class="px-4 py-2">
                                <div class="font-medium" x-text="(user.first_name || '') + ' ' + (user.last_name || '')"></div>
                                <div class="text-xs text-gray-500" x-text="user.email"></div>
                            </td>
                            <td class="px-4 py-2 text-gray-600" x-text="user.org_name"></td>
                            <td class="px-4 py-2 text-right font-medium" x-text="(user.total_searches || 0).toLocaleString()"></td>
                        </tr>
                    </template>
                </tbody>
            </table>
        </div>
    </div>
</template>
