<h2 class="text-lg font-semibold text-gray-900 mb-4">Credit Management</h2>

<!-- Org Selector -->
<div class="bg-white rounded-lg border border-gray-200 p-4 mb-4">
    <div class="flex gap-3 items-end">
        <div class="flex-1">
            <label class="text-xs font-medium text-gray-500 block mb-1">Search Organization</label>
            <input type="text" x-model.debounce.300ms="orgSearch" @input="searchOrgs()"
                   placeholder="Type org name or email..."
                   class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500">
        </div>
    </div>

    <!-- Org search results -->
    <template x-if="orgResults.length > 0 && !selectedOrg">
        <div class="mt-2 border border-gray-200 rounded-lg max-h-40 overflow-auto">
            <template x-for="o in orgResults" :key="o.id">
                <button @click="selectOrg(o)" class="w-full text-left px-3 py-2 hover:bg-gray-50 text-sm flex justify-between">
                    <span x-text="o.name"></span>
                    <span class="text-xs text-gray-400" x-text="o.plan_name"></span>
                </button>
            </template>
        </div>
    </template>
</div>

<!-- Selected Org Credit Info -->
<template x-if="selectedOrg && credits">
    <div class="space-y-4">
        <div class="bg-white rounded-lg border border-gray-200 p-4">
            <div class="flex items-center justify-between mb-3">
                <h3 class="font-medium text-gray-900" x-text="selectedOrg.name"></h3>
                <button @click="selectedOrg = null; credits = null" class="text-xs text-gray-400 hover:text-gray-600">Clear</button>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-4">
                <div class="border rounded-lg p-3">
                    <div class="text-xs text-gray-500">Logo Monthly</div>
                    <div class="text-lg font-bold" x-text="credits.logo_credits?.monthly_remaining ?? 0"></div>
                    <div class="text-[10px] text-gray-400" x-text="'Plan default: ' + (credits.logo_credits?.plan_default ?? 0)"></div>
                </div>
                <div class="border rounded-lg p-3">
                    <div class="text-xs text-gray-500">Logo Purchased</div>
                    <div class="text-lg font-bold" x-text="credits.logo_credits?.purchased ?? 0"></div>
                </div>
                <div class="border rounded-lg p-3">
                    <div class="text-xs text-gray-500">Name Purchased</div>
                    <div class="text-lg font-bold" x-text="credits.name_credits?.purchased ?? 0"></div>
                </div>
                <div class="border rounded-lg p-3">
                    <div class="text-xs text-gray-500">Used This Month</div>
                    <div class="text-lg font-bold" x-text="(credits.logo_credits?.used_this_month ?? 0) + ' / ' + (credits.name_credits?.used_this_month ?? 0)"></div>
                    <div class="text-[10px] text-gray-400">Logo / Name</div>
                </div>
            </div>

            <!-- Adjust Form -->
            <div class="border-t pt-4">
                <h4 class="text-sm font-medium text-gray-700 mb-3">Adjust Credits</h4>
                <div class="flex flex-wrap gap-3 items-end">
                    <div>
                        <label class="text-xs text-gray-500 block mb-1">Type</label>
                        <select x-model="adjustForm.credit_type" class="px-3 py-2 border border-gray-300 rounded-lg text-sm">
                            <option value="logo_purchased">Logo Purchased</option>
                            <option value="logo_monthly">Logo Monthly</option>
                            <option value="name_purchased">Name Purchased</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-xs text-gray-500 block mb-1">Operation</label>
                        <select x-model="adjustForm.operation" class="px-3 py-2 border border-gray-300 rounded-lg text-sm">
                            <option value="add">Add</option>
                            <option value="subtract">Subtract</option>
                            <option value="set">Set</option>
                        </select>
                    </div>
                    <div>
                        <label class="text-xs text-gray-500 block mb-1">Amount</label>
                        <input type="number" x-model.number="adjustForm.amount" min="0"
                               class="w-24 px-3 py-2 border border-gray-300 rounded-lg text-sm">
                    </div>
                    <div class="flex-1 min-w-[150px]">
                        <label class="text-xs text-gray-500 block mb-1">Reason</label>
                        <input type="text" x-model="adjustForm.reason" placeholder="Reason..."
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
                    </div>
                    <button @click="adjustCredits()" class="px-4 py-2 bg-indigo-600 text-white text-sm rounded-lg hover:bg-indigo-700">Apply</button>
                </div>
            </div>
        </div>

        <!-- Bulk Operations -->
        <div class="bg-white rounded-lg border border-gray-200 p-4">
            <h3 class="text-sm font-medium text-gray-700 mb-3">Bulk Credit Operation</h3>
            <div class="flex flex-wrap gap-3 items-end">
                <div>
                    <label class="text-xs text-gray-500 block mb-1">Plan Filter</label>
                    <select x-model="bulkForm.plan_filter" class="px-3 py-2 border border-gray-300 rounded-lg text-sm">
                        <option value="all">All Plans</option>
                        <option value="free">Free</option>
                        <option value="starter">Starter</option>
                        <option value="professional">Professional</option>
                        <option value="enterprise">Enterprise</option>
                    </select>
                </div>
                <div>
                    <label class="text-xs text-gray-500 block mb-1">Type</label>
                    <select x-model="bulkForm.credit_type" class="px-3 py-2 border border-gray-300 rounded-lg text-sm">
                        <option value="logo_purchased">Logo Purchased</option>
                        <option value="logo_monthly">Logo Monthly</option>
                        <option value="name_purchased">Name Purchased</option>
                    </select>
                </div>
                <div>
                    <label class="text-xs text-gray-500 block mb-1">Operation</label>
                    <select x-model="bulkForm.operation" class="px-3 py-2 border border-gray-300 rounded-lg text-sm">
                        <option value="add">Add</option>
                        <option value="set">Set</option>
                    </select>
                </div>
                <div>
                    <label class="text-xs text-gray-500 block mb-1">Amount</label>
                    <input type="number" x-model.number="bulkForm.amount" min="0"
                           class="w-24 px-3 py-2 border border-gray-300 rounded-lg text-sm">
                </div>
                <div class="flex-1 min-w-[120px]">
                    <label class="text-xs text-gray-500 block mb-1">Reason</label>
                    <input type="text" x-model="bulkForm.reason" placeholder="Reason..."
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
                </div>
                <button @click="bulkAdjust()" class="px-4 py-2 bg-amber-600 text-white text-sm rounded-lg hover:bg-amber-700">Bulk Apply</button>
            </div>
        </div>
    </div>
</template>
