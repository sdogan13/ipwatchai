<h2 class="text-lg font-semibold text-gray-900 mb-4">Plans & Limits</h2>

<template x-if="loading">
    <div class="flex items-center gap-2 text-gray-500 py-8">
        <svg class="animate-spin h-5 w-5" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
        Loading...
    </div>
</template>

<template x-if="!loading">
    <div class="space-y-6">
        <template x-for="plan in plans" :key="plan.db_record.name">
            <div class="bg-white rounded-lg border border-gray-200 p-5">
                <div class="flex items-center justify-between mb-4">
                    <div class="flex items-center gap-3">
                        <span class="px-3 py-1 text-sm font-bold rounded"
                              :class="{
                                  'bg-gray-100 text-gray-700': plan.db_record.name === 'free',
                                  'bg-blue-100 text-blue-700': plan.db_record.name === 'starter',
                                  'bg-purple-100 text-purple-700': plan.db_record.name === 'professional',
                                  'bg-amber-100 text-amber-700': plan.db_record.name === 'enterprise',
                              }"
                              x-text="plan.db_record.name.toUpperCase()"></span>
                        <span class="text-sm text-gray-500" x-text="plan.db_record.description || ''"></span>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-sm text-gray-500">Price:</span>
                        <input type="number" step="0.01" :value="plan.db_record.price_monthly || 0"
                               @change="updatePricing(plan.db_record.name, {price_monthly: parseFloat($event.target.value)})"
                               class="w-24 px-2 py-1 border border-gray-300 rounded text-sm text-right">
                        <span class="text-xs text-gray-500">/mo</span>
                    </div>
                </div>

                <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3">
                    <template x-for="feature in Object.keys(plan.code_defaults)" :key="feature">
                        <div class="border border-gray-100 rounded-lg p-3">
                            <div class="text-xs text-gray-500 mb-1 truncate" x-text="feature.replace(/_/g, ' ')"></div>
                            <div class="flex items-center gap-2">
                                <div class="flex-1">
                                    <input type="text"
                                           :value="plan.active_overrides[feature] !== undefined ? plan.active_overrides[feature] : plan.code_defaults[feature]"
                                           @keydown.enter="saveLimit(plan.db_record.name, feature, $event.target.value)"
                                           @blur="saveLimit(plan.db_record.name, feature, $event.target.value)"
                                           class="w-full px-2 py-1 border rounded text-sm"
                                           :class="plan.active_overrides[feature] !== undefined ? 'border-indigo-400 bg-indigo-50' : 'border-gray-200'">
                                </div>
                                <template x-if="plan.active_overrides[feature] !== undefined">
                                    <button @click="resetLimit(plan.db_record.name, feature)"
                                            class="text-xs text-gray-400 hover:text-red-600" title="Reset to default">
                                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                                    </button>
                                </template>
                            </div>
                            <div class="text-[10px] text-gray-400 mt-1" x-text="'Default: ' + plan.code_defaults[feature]"></div>
                        </div>
                    </template>
                </div>
            </div>
        </template>
    </div>
</template>
