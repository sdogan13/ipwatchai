<h2 class="text-lg font-semibold text-gray-900 mb-1">Plans & Limits</h2>
<p class="text-xs sm:text-sm text-gray-500 mb-4">Manage subscription tiers, pricing, and feature limits. Overridden values are highlighted in indigo. Changes take effect immediately.</p>

<template x-if="loading">
    <div class="flex items-center gap-2 text-gray-500 py-8">
        <svg class="animate-spin h-5 w-5" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
        Loading plans...
    </div>
</template>

<template x-if="!loading">
    <div class="space-y-3 sm:space-y-4">
        <template x-for="plan in plans" :key="plan.db_record.name">
            <div class="bg-white rounded-lg border-2 transition-all"
                 :class="plan.db_record.is_active !== false ? planColor(plan.db_record.name).border : 'border-gray-200 opacity-60'">

                <!-- Plan Header — stacks on mobile -->
                <div class="px-3 py-3 sm:px-5 sm:py-4 cursor-pointer"
                     @click="expandedPlan = expandedPlan === plan.db_record.name ? null : plan.db_record.name">
                    <!-- Top row: badge + status + chevron -->
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-2 flex-wrap min-w-0">
                            <span class="px-2.5 py-1 text-xs sm:text-sm font-bold rounded flex-shrink-0"
                                  :class="planColor(plan.db_record.name).bg + ' ' + planColor(plan.db_record.name).text"
                                  x-text="plan.db_record.name.toUpperCase()"></span>
                            <span class="text-xs px-2 py-0.5 rounded-full flex-shrink-0"
                                  :class="plan.db_record.is_active !== false ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'"
                                  x-text="plan.db_record.is_active !== false ? 'Active' : 'Inactive'"></span>
                            <span class="text-xs sm:text-sm text-gray-500 truncate hidden sm:inline" x-text="plan.db_record.description || ''"></span>
                        </div>
                        <svg class="w-5 h-5 text-gray-400 transition-transform flex-shrink-0 ml-2" :class="expandedPlan === plan.db_record.name ? 'rotate-180' : ''"
                             fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                    </div>
                    <!-- Bottom row: price + stats (wraps naturally) -->
                    <div class="flex flex-wrap items-center gap-x-4 gap-y-1 mt-2 text-xs sm:text-sm">
                        <div class="font-semibold text-gray-900">
                            <span x-text="'₺' + (plan.db_record.price_monthly || 0).toLocaleString()"></span>
                            <span class="text-[10px] sm:text-xs text-gray-400 font-normal">/mo</span>
                        </div>
                        <template x-if="plan.code_defaults.price_annual_monthly">
                            <div class="text-gray-500">
                                <span x-text="'₺' + (getEffective(plan, 'price_annual_monthly') || 0).toLocaleString()"></span><span class="text-[10px] sm:text-xs">/mo annual</span>
                            </div>
                        </template>
                        <span class="text-gray-400" x-text="(plan.active_orgs || 0) + ' orgs'"></span>
                        <span class="text-gray-400" x-text="Object.keys(plan.active_overrides).length + ' overrides'"></span>
                    </div>
                </div>

                <!-- Expanded Plan Details -->
                <div x-show="expandedPlan === plan.db_record.name" x-cloak class="border-t border-gray-100 px-3 py-3 sm:px-5 sm:py-4">

                    <!-- Pricing & Plan Info Section -->
                    <div class="mb-5 sm:mb-6">
                        <h4 class="text-sm font-semibold text-gray-700 mb-3 flex items-center gap-2">
                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                            Pricing & Info
                        </h4>
                        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-3">
                            <!-- Monthly Price (DB field) -->
                            <div class="border border-gray-100 rounded-lg p-3">
                                <div class="text-xs text-gray-500 mb-1">Monthly Price (₺)</div>
                                <input type="number" step="0.01" :value="plan.db_record.price_monthly || 0"
                                       @change="updatePricing(plan.db_record.name, {price_monthly: parseFloat($event.target.value)})"
                                       class="w-full px-2 py-1.5 border border-gray-200 rounded text-sm min-h-[40px]">
                                <div class="text-[10px] text-gray-400 mt-1">Stored in DB</div>
                            </div>
                            <!-- Annual Monthly Price (settings override) -->
                            <div class="border border-gray-100 rounded-lg p-3">
                                <div class="text-xs text-gray-500 mb-1">Annual Monthly (₺)</div>
                                <div class="flex items-center gap-1">
                                    <input type="number" step="0.01"
                                           :value="getEffective(plan, 'price_annual_monthly')"
                                           :data-original="getEffective(plan, 'price_annual_monthly')"
                                           @change="saveLimit(plan.db_record.name, 'price_annual_monthly', $event.target.value, $event.target.dataset.original)"
                                           class="w-full px-2 py-1.5 border rounded text-sm min-h-[40px]"
                                           :class="isOverridden(plan, 'price_annual_monthly') ? 'border-indigo-400 bg-indigo-50' : 'border-gray-200'">
                                    <template x-if="isOverridden(plan, 'price_annual_monthly')">
                                        <button @click="resetLimit(plan.db_record.name, 'price_annual_monthly')"
                                                class="text-gray-400 hover:text-red-600 flex-shrink-0 p-1 min-w-[32px] min-h-[32px] flex items-center justify-center" title="Reset">
                                            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                                        </button>
                                    </template>
                                </div>
                                <div class="text-[10px] text-gray-400 mt-1" x-text="'Default: ₺' + (plan.code_defaults.price_annual_monthly || 0)"></div>
                            </div>
                            <!-- Description (DB field) -->
                            <div class="border border-gray-100 rounded-lg p-3">
                                <div class="text-xs text-gray-500 mb-1">Description</div>
                                <input type="text" :value="plan.db_record.description || ''"
                                       @change="updatePricing(plan.db_record.name, {description: $event.target.value})"
                                       class="w-full px-2 py-1.5 border border-gray-200 rounded text-sm min-h-[40px]"
                                       placeholder="Plan description...">
                            </div>
                            <!-- Active Toggle -->
                            <div class="border border-gray-100 rounded-lg p-3">
                                <div class="text-xs text-gray-500 mb-1">Status</div>
                                <div class="flex items-center gap-2 mt-1">
                                    <button @click="togglePlanActive(plan.db_record.name, plan.db_record.is_active === false)"
                                            class="relative inline-flex h-7 w-12 items-center rounded-full transition-colors min-w-[48px]"
                                            :class="plan.db_record.is_active !== false ? 'bg-green-500' : 'bg-gray-300'">
                                        <span class="inline-block h-5 w-5 rounded-full bg-white transition-transform shadow"
                                              :class="plan.db_record.is_active !== false ? 'translate-x-6' : 'translate-x-1'"></span>
                                    </button>
                                    <span class="text-sm" x-text="plan.db_record.is_active !== false ? 'Active' : 'Inactive'"></span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Search Limits Section -->
                    <template x-if="getFeaturesForCategory(plan, 'search_limits').length > 0">
                        <div class="mb-5 sm:mb-6">
                            <h4 class="text-sm font-semibold text-gray-700 mb-3 flex items-center gap-2">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                                Search Limits
                            </h4>
                            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3">
                                <template x-for="feature in getFeaturesForCategory(plan, 'search_limits')" :key="feature">
                                    <div class="border border-gray-100 rounded-lg p-3">
                                        <div class="text-xs text-gray-500 mb-1 truncate" x-text="feature.replace(/_/g, ' ')"></div>
                                        <div class="flex items-center gap-1">
                                            <input type="text"
                                                   :value="getEffective(plan, feature)"
                                                   :data-original="getEffective(plan, feature)"
                                                   @keydown.enter="saveLimit(plan.db_record.name, feature, $event.target.value, $event.target.dataset.original)"
                                                   @blur="saveLimit(plan.db_record.name, feature, $event.target.value, $event.target.dataset.original)"
                                                   class="w-full px-2 py-1.5 border rounded text-sm min-h-[40px]"
                                                   :class="isOverridden(plan, feature) ? 'border-indigo-400 bg-indigo-50' : 'border-gray-200'">
                                            <template x-if="isOverridden(plan, feature)">
                                                <button @click="resetLimit(plan.db_record.name, feature)"
                                                        class="text-gray-400 hover:text-red-600 flex-shrink-0 p-1 min-w-[32px] min-h-[32px] flex items-center justify-center" title="Reset to default">
                                                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                                                </button>
                                            </template>
                                        </div>
                                        <div class="text-[10px] text-gray-400 mt-1" x-text="'Default: ' + plan.code_defaults[feature]"></div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>

                    <!-- Content & Usage Limits Section -->
                    <template x-if="getFeaturesForCategory(plan, 'content_limits').length > 0">
                        <div class="mb-5 sm:mb-6">
                            <h4 class="text-sm font-semibold text-gray-700 mb-3 flex items-center gap-2">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
                                Content & Usage Limits
                            </h4>
                            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3">
                                <template x-for="feature in getFeaturesForCategory(plan, 'content_limits')" :key="feature">
                                    <div class="border border-gray-100 rounded-lg p-3">
                                        <div class="text-xs text-gray-500 mb-1 truncate" x-text="feature.replace(/_/g, ' ')"></div>
                                        <div class="flex items-center gap-1">
                                            <input type="text"
                                                   :value="getEffective(plan, feature)"
                                                   :data-original="getEffective(plan, feature)"
                                                   @keydown.enter="saveLimit(plan.db_record.name, feature, $event.target.value, $event.target.dataset.original)"
                                                   @blur="saveLimit(plan.db_record.name, feature, $event.target.value, $event.target.dataset.original)"
                                                   class="w-full px-2 py-1.5 border rounded text-sm min-h-[40px]"
                                                   :class="isOverridden(plan, feature) ? 'border-indigo-400 bg-indigo-50' : 'border-gray-200'">
                                            <template x-if="isOverridden(plan, feature)">
                                                <button @click="resetLimit(plan.db_record.name, feature)"
                                                        class="text-gray-400 hover:text-red-600 flex-shrink-0 p-1 min-w-[32px] min-h-[32px] flex items-center justify-center" title="Reset to default">
                                                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                                                </button>
                                            </template>
                                        </div>
                                        <div class="text-[10px] text-gray-400 mt-1" x-text="'Default: ' + plan.code_defaults[feature]"></div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>

                    <!-- Feature Access (Boolean Flags) Section -->
                    <template x-if="getFeaturesForCategory(plan, 'boolean_flags').length > 0">
                        <div class="mb-5 sm:mb-6">
                            <h4 class="text-sm font-semibold text-gray-700 mb-3 flex items-center gap-2">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                                Feature Access
                            </h4>
                            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3">
                                <template x-for="feature in getFeaturesForCategory(plan, 'boolean_flags')" :key="feature">
                                    <div class="border border-gray-100 rounded-lg p-3 flex items-center justify-between gap-2 min-h-[56px]">
                                        <div class="min-w-0">
                                            <div class="text-xs text-gray-500 truncate" x-text="feature.replace(/^can_|^has_/g, '').replace(/_/g, ' ')"></div>
                                            <div class="text-[10px] text-gray-400" x-text="'Default: ' + plan.code_defaults[feature]"></div>
                                        </div>
                                        <div class="flex items-center gap-1 flex-shrink-0">
                                            <button @click="saveLimit(plan.db_record.name, feature, String(!getEffective(plan, feature)), String(getEffective(plan, feature)))"
                                                    class="relative inline-flex h-6 w-11 items-center rounded-full transition-colors min-w-[44px]"
                                                    :class="getEffective(plan, feature) ? 'bg-green-500' : 'bg-gray-300'">
                                                <span class="inline-block h-4 w-4 rounded-full bg-white transition-transform shadow"
                                                      :class="getEffective(plan, feature) ? 'translate-x-5' : 'translate-x-0.5'"></span>
                                            </button>
                                            <template x-if="isOverridden(plan, feature)">
                                                <button @click="resetLimit(plan.db_record.name, feature)"
                                                        class="text-gray-400 hover:text-red-600 flex-shrink-0 p-1 min-w-[28px] min-h-[28px] flex items-center justify-center" title="Reset to default">
                                                    <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                                                </button>
                                            </template>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>

                    <!-- Other Settings Section -->
                    <template x-if="getFeaturesForCategory(plan, 'other').length > 0 || getUncategorizedFeatures(plan).length > 0">
                        <div class="mb-4">
                            <h4 class="text-sm font-semibold text-gray-700 mb-3 flex items-center gap-2">
                                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                                Other Settings
                            </h4>
                            <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3">
                                <template x-for="feature in getFeaturesForCategory(plan, 'other').concat(getUncategorizedFeatures(plan))" :key="feature">
                                    <div class="border border-gray-100 rounded-lg p-3">
                                        <div class="text-xs text-gray-500 mb-1 truncate" x-text="feature.replace(/_/g, ' ')"></div>
                                        <div class="flex items-center gap-1">
                                            <input type="text"
                                                   :value="getEffective(plan, feature)"
                                                   :data-original="getEffective(plan, feature)"
                                                   @keydown.enter="saveLimit(plan.db_record.name, feature, $event.target.value, $event.target.dataset.original)"
                                                   @blur="saveLimit(plan.db_record.name, feature, $event.target.value, $event.target.dataset.original)"
                                                   class="w-full px-2 py-1.5 border rounded text-sm min-h-[40px]"
                                                   :class="isOverridden(plan, feature) ? 'border-indigo-400 bg-indigo-50' : 'border-gray-200'">
                                            <template x-if="isOverridden(plan, feature)">
                                                <button @click="resetLimit(plan.db_record.name, feature)"
                                                        class="text-gray-400 hover:text-red-600 flex-shrink-0 p-1 min-w-[32px] min-h-[32px] flex items-center justify-center" title="Reset to default">
                                                    <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                                                </button>
                                            </template>
                                        </div>
                                        <div class="text-[10px] text-gray-400 mt-1" x-text="'Default: ' + plan.code_defaults[feature]"></div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>

                </div>
            </div>
        </template>
    </div>
</template>
