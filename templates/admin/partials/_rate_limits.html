<h2 class="text-lg font-semibold text-gray-900 mb-1">Rate Limits</h2>
<p class="text-xs sm:text-sm text-gray-500 mb-4">Adjust per-minute rate limits. Changes take effect within 60 seconds.</p>

<template x-if="loading">
    <div class="flex items-center gap-2 text-gray-500 py-8">
        <svg class="animate-spin h-5 w-5" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
        Loading...
    </div>
</template>

<template x-if="!loading">
    <div>
        <!-- Mobile: Card view -->
        <div class="sm:hidden space-y-3">
            <template x-for="item in items" :key="item.key">
                <div class="bg-white rounded-lg border border-gray-200 p-3">
                    <div class="font-mono text-xs text-gray-700 mb-1 break-all" x-text="item.key"></div>
                    <div class="text-xs text-gray-500 mb-2" x-text="item.description || '-'"></div>
                    <div class="flex items-center gap-2">
                        <input type="text"
                               :value="item.value"
                               @keydown.enter="saveSetting(item.key, $event.target.value); $event.target.blur()"
                               @blur="saveSetting(item.key, $event.target.value)"
                               class="flex-1 px-3 py-2 border border-gray-300 rounded text-sm text-center min-h-[40px]">
                        <button @click="deleteSetting(item.key)"
                                class="px-3 py-2 text-xs text-red-600 hover:bg-red-50 rounded min-h-[40px]">Reset</button>
                    </div>
                </div>
            </template>
            <template x-if="items.length === 0">
                <div class="py-8 text-center text-gray-500 text-sm">No rate limit settings configured</div>
            </template>
        </div>

        <!-- Desktop: Table view -->
        <div class="hidden sm:block bg-white rounded-lg border border-gray-200 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-sm min-w-[500px]">
                    <thead class="bg-gray-50 text-left">
                        <tr>
                            <th class="px-4 py-3 font-medium text-gray-600">Setting</th>
                            <th class="px-4 py-3 font-medium text-gray-600">Description</th>
                            <th class="px-4 py-3 font-medium text-gray-600 w-32">Value</th>
                            <th class="px-4 py-3 font-medium text-gray-600 w-24">Actions</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-gray-100">
                        <template x-for="item in items" :key="item.key">
                            <tr class="hover:bg-gray-50">
                                <td class="px-4 py-3 font-mono text-xs" x-text="item.key"></td>
                                <td class="px-4 py-3 text-gray-500 text-xs" x-text="item.description || '-'"></td>
                                <td class="px-4 py-3">
                                    <input type="text"
                                           :value="item.value"
                                           @keydown.enter="saveSetting(item.key, $event.target.value); $event.target.blur()"
                                           @blur="saveSetting(item.key, $event.target.value)"
                                           class="w-full px-2 py-1 border border-gray-300 rounded text-sm text-center">
                                </td>
                                <td class="px-4 py-3">
                                    <button @click="deleteSetting(item.key)"
                                            class="px-2 py-1 text-xs text-red-600 hover:bg-red-50 rounded">Reset</button>
                                </td>
                            </tr>
                        </template>
                        <template x-if="items.length === 0">
                            <tr><td colspan="4" class="px-4 py-8 text-center text-gray-500">No rate limit settings configured</td></tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</template>
