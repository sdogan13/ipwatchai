<div class="flex items-center justify-between mb-4">
    <h2 class="text-lg font-semibold text-gray-900">All Settings</h2>
    <button @click="showAdd = true" class="px-4 py-2 bg-indigo-600 text-white text-sm rounded-lg hover:bg-indigo-700">+ Add Setting</button>
</div>

<!-- Category filter -->
<div class="mb-4">
    <div class="flex gap-2 flex-wrap">
        <button @click="categoryFilter = ''; filterSettings()"
                class="px-3 py-1.5 text-xs rounded-full border"
                :class="categoryFilter === '' ? 'bg-indigo-50 border-indigo-300 text-indigo-700' : 'border-gray-300 text-gray-600 hover:bg-gray-50'">
            All
        </button>
        <template x-for="cat in categories" :key="cat">
            <button @click="categoryFilter = cat; filterSettings()"
                    class="px-3 py-1.5 text-xs rounded-full border"
                    :class="categoryFilter === cat ? 'bg-indigo-50 border-indigo-300 text-indigo-700' : 'border-gray-300 text-gray-600 hover:bg-gray-50'"
                    x-text="cat"></button>
        </template>
    </div>
</div>

<template x-if="loading">
    <div class="flex items-center gap-2 text-gray-500 py-8">
        <svg class="animate-spin h-5 w-5" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path></svg>
        Loading...
    </div>
</template>

<template x-if="!loading">
    <div class="bg-white rounded-lg border border-gray-200 overflow-hidden">
        <table class="w-full text-sm">
            <thead class="bg-gray-50 text-left">
                <tr>
                    <th class="px-4 py-3 font-medium text-gray-600">Key</th>
                    <th class="px-4 py-3 font-medium text-gray-600">Value</th>
                    <th class="px-4 py-3 font-medium text-gray-600">Category</th>
                    <th class="px-4 py-3 font-medium text-gray-600">Type</th>
                    <th class="px-4 py-3 font-medium text-gray-600">Updated</th>
                    <th class="px-4 py-3 font-medium text-gray-600 w-24">Actions</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-gray-100">
                <template x-for="item in filteredItems" :key="item.key">
                    <tr class="hover:bg-gray-50">
                        <td class="px-4 py-3 font-mono text-xs max-w-[200px] truncate" :title="item.key" x-text="item.key"></td>
                        <td class="px-4 py-3">
                            <input type="text"
                                   :value="typeof item.value === 'object' ? JSON.stringify(item.value) : item.value"
                                   @keydown.enter="saveItem(item.key, $event.target.value, item.category, item.value_type); $event.target.blur()"
                                   class="w-full px-2 py-1 border border-gray-200 rounded text-xs max-w-[200px]">
                        </td>
                        <td class="px-4 py-3">
                            <span class="px-2 py-0.5 text-[10px] rounded-full bg-gray-100 text-gray-600" x-text="item.category"></span>
                        </td>
                        <td class="px-4 py-3 text-xs text-gray-500" x-text="item.value_type || '-'"></td>
                        <td class="px-4 py-3 text-[10px] text-gray-400" x-text="item.updated_at ? new Date(item.updated_at).toLocaleString() : '-'"></td>
                        <td class="px-4 py-3">
                            <button @click="deleteItem(item.key)" class="px-2 py-1 text-xs text-red-600 hover:bg-red-50 rounded">Delete</button>
                        </td>
                    </tr>
                </template>
                <template x-if="filteredItems.length === 0">
                    <tr><td colspan="6" class="px-4 py-8 text-center text-gray-500">No settings found</td></tr>
                </template>
            </tbody>
        </table>
    </div>
</template>

<!-- Add Setting Modal -->
<template x-if="showAdd">
    <div class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center" @click.self="showAdd = false">
        <div class="bg-white rounded-xl shadow-xl max-w-md w-full p-6">
            <h3 class="text-lg font-semibold mb-4">Add Setting</h3>
            <div class="space-y-3">
                <div>
                    <label class="text-xs font-medium text-gray-500 block mb-1">Key</label>
                    <input type="text" x-model="addForm.key" placeholder="feature.my_flag"
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
                </div>
                <div>
                    <label class="text-xs font-medium text-gray-500 block mb-1">Value</label>
                    <input type="text" x-model="addForm.value" placeholder="true"
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-xs font-medium text-gray-500 block mb-1">Category</label>
                        <input type="text" x-model="addForm.category" placeholder="feature_flags"
                               class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
                    </div>
                    <div>
                        <label class="text-xs font-medium text-gray-500 block mb-1">Value Type</label>
                        <select x-model="addForm.value_type" class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
                            <option value="string">String</option>
                            <option value="integer">Integer</option>
                            <option value="boolean">Boolean</option>
                            <option value="json">JSON</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="text-xs font-medium text-gray-500 block mb-1">Description</label>
                    <input type="text" x-model="addForm.description" placeholder="Optional description"
                           class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm">
                </div>
            </div>
            <div class="flex justify-end gap-2 mt-4">
                <button @click="showAdd = false" class="px-4 py-2 text-sm text-gray-700 bg-gray-100 rounded-lg hover:bg-gray-200">Cancel</button>
                <button @click="addSetting()" class="px-4 py-2 text-sm text-white bg-indigo-600 rounded-lg hover:bg-indigo-700">Add</button>
            </div>
        </div>
    </div>
</template>
