<!-- ============================================ -->
<!-- DESIGN SEARCH TAB (Tasarım Arama)            -->
<!-- ============================================ -->
<div id="tab-content-design-search" class="hidden max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-6 pb-4">

  <!-- Search form card -->
  <div class="rounded-xl shadow-sm border p-5"
       style="background:var(--color-bg-card);border-color:var(--color-border)">

    <div class="flex items-center justify-between mb-4">
      <h2 class="text-lg font-semibold" style="color:var(--color-text-primary)"
          x-text="t('design_search.panel_title')">Tasarım Arama</h2>
      <span class="text-xs px-2 py-1 rounded-full"
            style="background:var(--color-bg-muted);color:var(--color-text-secondary)"
            x-text="t('registry.design')">Tasarım</span>
    </div>

    <!-- Text query -->
    <div class="mb-3">
      <div class="flex items-center rounded-xl overflow-hidden"
           style="background:var(--color-bg-card);border:2px solid var(--color-border)">
        <svg class="w-5 h-5 ml-4 shrink-0" style="color:var(--color-text-muted)"
             fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
        <input type="text" id="design-search-input"
               :placeholder="t('design_search.query_placeholder')"
               class="flex-1 px-4 py-3 text-base outline-none min-w-0"
               style="background:transparent;color:var(--color-text-primary)"
               autocomplete="off" maxlength="100" />
      </div>
    </div>

    <!-- Filters row: Locarno classes + image upload -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-3">

      <!-- Locarno class filter -->
      <div>
        <label class="block text-xs font-medium mb-1"
               style="color:var(--color-text-secondary)"
               x-text="t('design_search.locarno_label')">Locarno Sınıfı</label>
        <input type="text" id="design-search-locarno"
               :placeholder="t('design_search.locarno_placeholder')"
               class="w-full px-3 py-2 rounded-lg outline-none text-sm"
               style="background:var(--color-bg-card);border:1px solid var(--color-border);color:var(--color-text-primary)" />
        <p class="text-xs mt-1" style="color:var(--color-text-faint)"
           x-text="t('design_search.locarno_hint')">Örnek: 06-01, 06-02</p>
      </div>

      <!-- Image upload -->
      <div>
        <label class="block text-xs font-medium mb-1"
               style="color:var(--color-text-secondary)"
               x-text="t('design_search.upload_label')">Görsel Yükle</label>
        <div class="relative">
          <input type="file" id="design-search-image" accept="image/*"
                 class="w-full px-3 py-2 rounded-lg outline-none text-sm"
                 style="background:var(--color-bg-card);border:1px solid var(--color-border);color:var(--color-text-primary)" />
          <button type="button" id="design-search-image-clear"
                  class="hidden absolute right-2 top-1/2 -translate-y-1/2 text-xs px-2 py-1 rounded"
                  style="background:var(--color-bg-muted);color:var(--color-text-secondary)"
                  x-text="t('design_search.image_clear')">Temizle</button>
        </div>
        <p class="text-xs mt-1" style="color:var(--color-text-faint)"
           x-text="t('design_search.upload_hint')">Maks 10 MB · JPG/PNG/WebP</p>
      </div>
    </div>

    <!-- Action row -->
    <div class="flex items-center gap-2">
      <button type="button" id="design-search-submit"
              class="px-4 py-2 rounded-lg font-medium text-sm bg-indigo-600 text-white hover:bg-indigo-700 transition-colors disabled:opacity-50"
              x-text="t('design_search.submit')">Ara</button>
      <button type="button" id="design-search-reset"
              class="px-4 py-2 rounded-lg font-medium text-sm hover:opacity-80 transition-colors"
              style="background:var(--color-bg-muted);color:var(--color-text-secondary)"
              x-text="t('design_search.reset')">Sıfırla</button>
      <span id="design-search-status" class="text-xs ml-auto"
            style="color:var(--color-text-muted)"></span>
    </div>
  </div>

  <!-- Results card -->
  <div id="design-search-results-card" class="hidden mt-4 rounded-xl shadow-sm border p-5"
       style="background:var(--color-bg-card);border-color:var(--color-border)">

    <!-- Header -->
    <div class="flex items-center justify-between mb-3">
      <h3 class="text-sm font-semibold" style="color:var(--color-text-primary)">
        <span x-text="t('design_search.results_title')">Sonuçlar</span>
        <span id="design-search-total-badge"
              class="ml-2 text-xs px-2 py-0.5 rounded-full"
              style="background:var(--color-bg-muted);color:var(--color-text-secondary)">0</span>
      </h3>
      <span id="design-search-duration" class="text-xs"
            style="color:var(--color-text-faint)"></span>
    </div>

    <!-- Loading state -->
    <div id="design-search-loading" class="hidden py-12 text-center">
      <div class="inline-block animate-spin rounded-full h-8 w-8 border-2 border-indigo-600 border-t-transparent"></div>
      <p class="text-sm mt-3" style="color:var(--color-text-muted)"
         x-text="t('design_search.loading')">Aranıyor…</p>
    </div>

    <!-- Empty state -->
    <div id="design-search-empty" class="hidden py-12 text-center">
      <svg class="w-12 h-12 mx-auto mb-2" style="color:var(--color-text-faint)"
           fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      <p class="text-sm font-medium" style="color:var(--color-text-secondary)"
         x-text="t('design_search.empty_title')">Sonuç bulunamadı</p>
      <p class="text-xs mt-1" style="color:var(--color-text-faint)"
         x-text="t('design_search.empty_body')">Farklı bir terim veya görselle deneyin.</p>
    </div>

    <!-- Error state -->
    <div id="design-search-error" class="hidden p-4 rounded-lg text-sm"
         style="background:var(--color-bg-error,#fee2e2);color:var(--color-text-error,#991b1b)"></div>

    <!-- Results grid -->
    <div id="design-search-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
  </div>
</div>
