<!-- Mobile drawer + bottom bar JS -->
<script>
function toggleMobileDrawer() {
    var backdrop = document.getElementById('mobile-drawer-backdrop');
    var drawer = document.getElementById('mobile-drawer');
    var btn = document.getElementById('hamburger-btn');
    if (backdrop.classList.contains('hidden')) {
        backdrop.classList.remove('hidden');
        requestAnimationFrame(function() {
            drawer.style.transform = 'translateX(0)';
        });
        btn.setAttribute('aria-expanded', 'true');
        document.body.style.overflow = 'hidden';
    } else {
        closeMobileDrawer();
    }
}
function closeMobileDrawer() {
    var backdrop = document.getElementById('mobile-drawer-backdrop');
    var drawer = document.getElementById('mobile-drawer');
    var btn = document.getElementById('hamburger-btn');
    drawer.style.transform = 'translateX(-100%)';
    setTimeout(function() { backdrop.classList.add('hidden'); }, 300);
    if (btn) btn.setAttribute('aria-expanded', 'false');
    document.body.style.overflow = '';
}

function scrollToSearch() {
    var el = document.getElementById('search-input');
    if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'center' }); el.focus(); }
}
function scrollToWatchlist() {
    if (typeof showDashboardTab === 'function') showDashboardTab('watchlist');
}
function scrollToAlerts() {
    var el = document.getElementById('alert-list-header');
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// Update active bottom tab styling
function updateBottomTabActive(tabName) {
    document.querySelectorAll('.bottom-tab-btn').forEach(function(btn) {
        btn.style.color = 'var(--color-text-muted)';
    });
    var activeMap = {
        'overview': 'bottom-tab-overview',
        'watchlist': 'bottom-tab-watchlist',
        'search': 'bottom-tab-search',
        'opposition-radar': 'bottom-tab-radar',
        'ai-studio': 'bottom-tab-ai-studio',
        'reports': 'bottom-tab-reports',
        'applications': 'bottom-tab-applications'
    };
    var activeId = activeMap[tabName];
    if (activeId) {
        var active = document.getElementById(activeId);
        if (active) active.style.color = 'var(--color-primary)';
    }
}

// Dark mode toggle
function toggleDarkMode() {
    var html = document.documentElement;
    var isDark = html.classList.toggle('dark');
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
    updateThemeIcons(isDark);
}
function updateThemeIcons(isDark) {
    var sun = document.getElementById('theme-icon-light');
    var moon = document.getElementById('theme-icon-dark');
    if (sun && moon) {
        sun.classList.toggle('hidden', !isDark);
        moon.classList.toggle('hidden', isDark);
    }
}
// Initialize theme
(function() {
    var saved = localStorage.getItem('theme');
    var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    var isDark = saved === 'dark' || (!saved && prefersDark);
    if (isDark) document.documentElement.classList.add('dark');
    // Icons update after DOM ready
    document.addEventListener('DOMContentLoaded', function() { updateThemeIcons(isDark); });
})();
</script>
