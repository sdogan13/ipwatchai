<!-- ============================================ -->
<!-- SEARCH TAB (Alpine.js reactive)             -->
<!-- ============================================ -->
<div id="tab-content-search" class="hidden max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-6 pb-4">
    <div class="rounded-xl shadow-sm border p-5" style="background:var(--color-bg-card);border-color:var(--color-border)">

        <!-- Text Input -->
        <div class="max-w-full mx-auto mb-3 relative" @click.outside="showSearchHistory = false">
            <div class="flex items-center rounded-xl overflow-hidden" style="background:var(--color-bg-card);border:2px solid var(--color-border)">
                <svg class="w-5 h-5 ml-4 shrink-0" style="color:var(--color-text-muted)" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7M9 18L5 6l-1 0"/><text x="3" y="18" font-size="11" font-weight="bold" fill="currentColor" stroke="none" font-family="sans-serif">A</text><text x="13" y="18" font-size="8" font-weight="bold" fill="currentColor" stroke="none" font-family="sans-serif">a</text></svg>
                <input type="text" id="search-input" x-model="searchQuery"
                       @keydown.enter="showSearchHistory = false; dashboardQuickSearch()"
                       @keydown.escape="showSearchHistory = false"
                       @keydown.arrow-down.prevent="$refs.historyList && $refs.historyList.querySelector('button') && $refs.historyList.querySelector('button').focus()"
                       @click="if(searchHistory.length) showSearchHistory = true"
                       @input="showSearchHistory = (searchQuery.trim().length > 0 && filteredSearchHistory().length > 0); if(!searchQuery.trim() && !selectedImage) { searchResults = []; searchError = ''; expandedResult = null; suggestedClasses = []; classInput = ''; selectedClasses = []; classError = ''; }"
                       :placeholder="t('search.placeholder')"
                       class="flex-1 px-4 py-3 text-base outline-none min-w-0"
                       style="background:transparent;color:var(--color-text-primary)"
                       autocomplete="off" name="trademark-search"
                       maxlength="100">
                <button x-show="searchQuery.trim()" x-cloak type="button"
                        @click="searchQuery = ''; if(!selectedImage) { searchResults = []; searchError = ''; expandedResult = null; suggestedClasses = []; classInput = ''; selectedClasses = []; classError = ''; }"
                        class="pr-4" style="color:var(--color-text-faint)">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>

            <!-- Search History Dropdown -->
            <div x-show="showSearchHistory && filteredSearchHistory().length > 0" x-cloak
                 x-ref="historyList"
                 class="absolute left-0 right-0 mt-1 rounded-xl shadow-lg border overflow-hidden"
                 style="background:var(--color-bg-card);border-color:var(--color-border);z-index:50">
                <div class="flex items-center justify-between px-4 py-2" style="border-bottom:1px solid var(--color-border)">
                    <span class="text-xs font-medium" style="color:var(--color-text-faint)" x-text="t('search.recent_searches')"></span>
                    <button @click.stop="clearSearchHistory()" class="text-xs hover:underline" style="color:var(--color-text-faint)" x-text="t('search.clear_history')"></button>
                </div>
                <template x-for="(item, idx) in filteredSearchHistory()" :key="item">
                    <button @click="selectSearchHistoryItem(item)"
                            @keydown.arrow-down.prevent="$el.nextElementSibling && $el.nextElementSibling.focus()"
                            @keydown.arrow-up.prevent="$el.previousElementSibling ? $el.previousElementSibling.focus() : $el.closest('[x-ref=historyList]').previousElementSibling.querySelector('input').focus()"
                            @keydown.enter.prevent="selectSearchHistoryItem(item)"
                            class="flex items-center justify-between w-full px-4 py-2.5 text-left text-sm hover:bg-indigo-50 dark:hover:bg-indigo-900/20 transition-colors"
                            style="color:var(--color-text-primary)">
                        <span class="flex items-center gap-2 min-w-0">
                            <svg class="w-4 h-4 shrink-0" style="color:var(--color-text-faint)" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                            <span class="truncate" x-text="item"></span>
                        </span>
                        <span @click.stop="removeSearchHistoryItem(item)" class="shrink-0 p-1 rounded hover:bg-gray-200 dark:hover:bg-gray-700" style="color:var(--color-text-faint)" title="Remove">
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                        </span>
                    </button>
                </template>
            </div>
        </div>

        <!-- Logo Upload (Alpine.js drag-drop) -->
        <div class="mb-3">
            <div class="flex items-center gap-3 px-4 py-3 rounded-xl cursor-pointer transition-all"
                 :class="dragOver ? 'ring-2 ring-indigo-400' : ''"
                 :style="'background:' + (dragOver ? 'var(--color-primary-light)' : 'var(--color-bg-muted)') + ';border:1px dashed var(--color-border)'"
                 @click="$refs.dashImageInput.click()"
                 @dragover.prevent="dragOver = true"
                 @dragleave="dragOver = false"
                 @drop.prevent="handleDrop($event)">

                <!-- No image: upload prompt -->
                <template x-if="!selectedImage">
                    <div class="flex items-center gap-3 w-full">
                        <div class="w-10 h-10 rounded-lg flex items-center justify-center flex-shrink-0" style="background:var(--color-primary-light)">
                            <svg class="w-5 h-5" style="color:var(--color-primary)" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                            </svg>
                        </div>
                        <div class="flex-1 min-w-0">
                            <span class="text-sm font-medium" style="color:var(--color-text-secondary)" x-text="t('search.drop_logo')">Drop logo here or click to upload</span>
                            <span class="text-xs ml-1" style="color:var(--color-text-faint)" x-text="t('search.optional')">(optional)</span>
                            <p class="text-xs mt-0.5" style="color:var(--color-text-faint)" x-text="t('search.image_hint')">PNG, JPG or WEBP</p>
                        </div>
                        <svg class="w-5 h-5 flex-shrink-0" style="color:var(--color-text-faint)" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
                        </svg>
                    </div>
                </template>

                <!-- Has image: preview -->
                <template x-if="selectedImage">
                    <div class="flex items-center gap-3 w-full">
                        <div class="relative flex-shrink-0">
                            <img :src="imagePreview" class="h-12 w-12 object-contain rounded-lg border" style="border-color:var(--color-border);background:var(--color-bg-card)" alt="Logo">
                        </div>
                        <div class="flex-1 min-w-0">
                            <p class="text-sm font-medium truncate" style="color:var(--color-text-primary)" x-text="imageName"></p>
                            <p class="text-xs" style="color:var(--color-text-muted)" x-text="t('search.visual_analysis')">Visual similarity analysis</p>
                        </div>
                        <button type="button" @click.stop="clearImage()"
                                class="w-7 h-7 rounded-full flex items-center justify-center flex-shrink-0 text-sm"
                                style="background:var(--color-bg-muted);color:var(--color-text-secondary)"
                                :title="t('search.remove_logo')">
                            &times;
                        </button>
                    </div>
                </template>
            </div>
            <input type="file" x-ref="dashImageInput" accept="image/png,image/jpeg,image/webp,image/*"
                   class="hidden" @change="onImageSelected($event)">
        </div>

        <!-- ===== Nice Class Finder (collapsible) ===== -->
        <div class="mb-3" x-data="{ classOpen: false }">
            <!-- Toggle header bar with selected chips -->
            <button @click="classOpen = !classOpen; if(classOpen && allClasses.length === 0) loadAllClasses()"
                    class="w-full flex items-center justify-between px-4 py-3 rounded-xl text-sm font-medium transition-all"
                    :style="'background:' + (classOpen || selectedClasses.length > 0 ? 'var(--color-primary-light)' : 'var(--color-bg-muted)') + ';border:1px solid ' + (classOpen ? 'var(--color-primary)' : 'var(--color-border)') + ';color:' + (classOpen || selectedClasses.length > 0 ? 'var(--color-primary)' : 'var(--color-text-secondary)')">
                <div class="flex items-center gap-2 min-w-0 flex-1">
                    <svg class="w-4 h-4 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A2 2 0 013 12V7a4 4 0 014-4z"/></svg>
                    <!-- Label when no classes selected -->
                    <span x-show="selectedClasses.length === 0" x-text="t('search.class_finder_toggle')"></span>
                    <!-- Selected class chips inline in the bar -->
                    <div x-show="selectedClasses.length > 0" x-cloak class="flex items-center flex-wrap gap-1.5 min-w-0">
                        <template x-for="num in selectedClasses" :key="num">
                            <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[11px] font-bold text-white" style="background:var(--color-primary)"
                                  @click.stop>
                                <span x-text="t('search.class_label') + ' ' + num"></span>
                                <button @click.stop="removeClass(num)" class="hover:opacity-70 leading-none">&times;</button>
                            </span>
                        </template>
                    </div>
                </div>
                <svg class="w-4 h-4 shrink-0 transition-transform" :class="classOpen ? 'rotate-180' : ''" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
            </button>

            <!-- Expandable body -->
            <div x-show="classOpen" x-cloak x-collapse class="mt-2 rounded-xl overflow-hidden" style="border:1px solid var(--color-border);background:var(--color-bg-card)">
                <!-- AI Suggestion input -->
                <div class="p-4">
                    <p class="text-xs mb-2" style="color:var(--color-text-muted)" x-text="t('search.class_input_placeholder')"></p>
                    <div class="flex gap-2">
                        <input type="text" x-model="classInput"
                               :placeholder="t('search.class_suggest_placeholder')"
                               class="flex-1 px-3 py-2.5 rounded-lg text-sm outline-none"
                               style="border:1px solid var(--color-border);color:var(--color-text-primary);background:var(--color-bg-input)"
                               @keydown.enter.prevent="submitClassInput()"
                               @input="if(!classInput.trim()) suggestedClasses = []">
                        <!-- Sinif Oner button: only when no classes selected -->
                        <button x-show="selectedClasses.length === 0" @click="submitClassInput()" :disabled="suggesting || !classInput.trim()"
                                class="px-4 py-2.5 rounded-lg text-sm font-medium text-white whitespace-nowrap disabled:opacity-50 flex items-center gap-1.5"
                                style="background:var(--color-primary)">
                            <svg x-show="suggesting" x-cloak class="w-3.5 h-3.5 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
                            <svg x-show="!suggesting" class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                            <span x-text="suggesting ? t('search.suggesting') : t('search.suggest_classes')">Sinif Oner</span>
                        </button>
                        <!-- Tamam button: when classes are selected -->
                        <button x-show="selectedClasses.length > 0" x-cloak @click="classOpen = false"
                                class="px-5 py-2.5 rounded-lg text-sm font-medium text-white whitespace-nowrap flex items-center gap-1.5"
                                style="background:#22c55e">
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
                            <span x-text="t('common.done')">Done</span>
                        </button>
                    </div>

                    <!-- AI Suggestion chips -->
                    <div x-show="suggestedClasses.length > 0" x-cloak x-transition class="mt-3">
                        <p class="text-[11px] uppercase tracking-wide mb-2 font-medium" style="color:var(--color-text-faint)" x-text="t('search.click_to_select')"></p>
                        <div class="flex flex-wrap gap-2">
                            <template x-for="cls in suggestedClasses" :key="cls.class_number">
                                <button @click="selectClass(cls)"
                                        class="group flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-medium transition-all"
                                        :style="selectedClasses.includes(cls.class_number)
                                            ? 'background:var(--color-primary);color:white;box-shadow:0 2px 8px rgba(99,102,241,0.3)'
                                            : 'background:var(--color-bg-muted);color:var(--color-text-secondary);border:1px solid var(--color-border)'">
                                    <!-- Checkbox indicator -->
                                    <span x-show="!selectedClasses.includes(cls.class_number)" class="w-3.5 h-3.5 flex-shrink-0 rounded border inline-flex items-center justify-center" style="border-color:var(--color-text-faint)"></span>
                                    <span x-show="selectedClasses.includes(cls.class_number)" class="w-3.5 h-3.5 flex-shrink-0 rounded bg-white inline-flex items-center justify-center">
                                        <svg class="w-2.5 h-2.5" fill="none" stroke="var(--color-primary)" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
                                    </span>
                                    <span class="font-bold" x-text="cls.class_number"></span>
                                    <span class="opacity-80" x-text="t('nice_classes.' + cls.class_number)"></span>
                                    <span class="opacity-50 text-[10px]" x-text="Math.round(cls.similarity * 100) + '%'"></span>
                                </button>
                            </template>
                        </div>
                    </div>

                    <!-- Class error -->
                    <div x-show="classError" x-cloak class="mt-2 px-3 py-2 rounded-lg text-xs" style="background:var(--color-risk-high-bg);color:var(--color-risk-high-text)">
                        <span x-text="classError"></span>
                    </div>
                </div>

                <!-- Divider -->
                <div class="px-4"><div style="border-top:1px solid var(--color-border)"></div></div>

                <!-- Browse All 45 Classes -->
                <div class="p-4">
                    <div class="flex items-center justify-between mb-2">
                        <p class="text-xs font-medium" style="color:var(--color-text-secondary)" x-text="t('search.class_tab_browse')">Tum Siniflar</p>
                        <input type="text" x-model="browseFilter"
                               :placeholder="t('search.browse_filter_placeholder')"
                               class="w-40 px-2.5 py-1.5 rounded-lg text-xs outline-none"
                               style="border:1px solid var(--color-border);color:var(--color-text-primary);background:var(--color-bg-input)">
                    </div>
                    <div class="max-h-[220px] overflow-y-auto rounded-lg" style="scrollbar-width:thin">
                        <div x-show="browseLoading" class="text-center py-6">
                            <svg class="w-5 h-5 animate-spin mx-auto" style="color:var(--color-primary)" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
                        </div>
                        <div x-show="!browseLoading" class="grid grid-cols-1 sm:grid-cols-2 gap-1">
                            <template x-for="cls in filteredClasses" :key="cls.number">
                                <button @click="toggleBrowseClass(cls.number)"
                                        class="flex items-center gap-2 px-3 py-2 rounded-lg text-left text-xs transition-all"
                                        :style="selectedClasses.includes(cls.number)
                                            ? 'background:var(--color-primary);color:white'
                                            : 'color:var(--color-text-secondary)'
                                        "
                                        :class="!selectedClasses.includes(cls.number) ? 'hover:bg-[var(--color-bg-muted)]' : ''">
                                    <!-- Checkbox indicator -->
                                    <span x-show="!selectedClasses.includes(cls.number)" class="w-3.5 h-3.5 flex-shrink-0 rounded border inline-flex items-center justify-center" style="border-color:var(--color-text-faint)"></span>
                                    <span x-show="selectedClasses.includes(cls.number)" class="w-3.5 h-3.5 flex-shrink-0 rounded bg-white inline-flex items-center justify-center">
                                        <svg class="w-2.5 h-2.5" fill="none" stroke="var(--color-primary)" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
                                    </span>
                                    <span class="font-bold w-6 text-center flex-shrink-0" x-text="cls.number"></span>
                                    <span class="flex-1 truncate" x-text="cls.name"></span>
                                </button>
                            </template>
                        </div>
                    </div>
                </div>
            </div>
        </div>


        <!-- Two Search Buttons side-by-side -->
        <div class="flex flex-col sm:flex-row gap-3">
            <!-- Quick Search -->
            <button @click="dashboardQuickSearch()"
                    :disabled="searchLoading || (!searchQuery.trim() && !selectedImage)"
                    class="flex-1 py-3 rounded-xl font-medium text-white flex items-center justify-center gap-2.5 disabled:opacity-50 transition-all text-base"
                    style="background:var(--color-primary);box-shadow:0 4px 14px rgba(99,102,241,0.3)">
                <svg x-show="!searchLoading || searchType !== 'quick'" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                <svg x-show="searchLoading && searchType === 'quick'" x-cloak class="w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
                <span x-text="t('search.button')">Ara</span>
            </button>

            <!-- Live Search (PRO) -->
            <button @click="dashboardLiveSearch()"
                    :disabled="searchLoading || (!searchQuery.trim() && !selectedImage)"
                    class="flex-1 py-3 rounded-xl font-medium text-white flex items-center justify-center gap-2.5 disabled:opacity-50 transition-all text-base bg-gradient-to-r from-amber-500 to-orange-500 hover:from-amber-600 hover:to-orange-600 shadow-lg"
                    :title="t('search.live_search')">
                <svg x-show="!searchLoading || searchType !== 'intelligent'" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                <svg x-show="searchLoading && searchType === 'intelligent'" x-cloak class="w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
                <span x-text="t('search.live_search')">Canli Arama</span>
                <span class="text-xs bg-white/20 px-1.5 py-0.5 rounded font-bold" x-text="t('tabs.pro')">PRO</span>
            </button>
        </div>

        <!-- Loading state -->
        <div x-show="searchLoading" x-cloak class="mt-3 flex items-center justify-center gap-2 text-sm font-medium" style="color:var(--color-primary)">
            <span class="animate-pulse">&#9203;</span>
            <span x-text="t('landing.ai_analysis_started')">AI analizi baslatildi...</span>
        </div>

        <!-- Search Error -->
        <div x-show="searchError" x-cloak class="mt-3 px-4 py-3 rounded-lg text-sm" style="background:var(--color-risk-critical-bg);color:var(--color-risk-critical-text)">
            <span x-text="searchError"></span>
        </div>

        <!-- Search Results (expandable cards - landing page style) -->
        <div x-show="searchResults.length > 0" x-cloak class="mt-4 text-left">
            <!-- Sort bar -->
            <div class="rounded-xl p-3 mb-3 flex flex-wrap items-center gap-x-4 gap-y-2" style="background:var(--color-bg-muted);border:1px solid var(--color-border)">
                <div class="flex flex-wrap items-center gap-2">
                    <span class="text-sm font-semibold" style="color:var(--color-text-primary)" x-text="t('sort.results_count', { count: searchMeta.total || searchResults.length })"></span>
                    <span class="inline-flex items-center text-xs px-2 py-0.5 rounded-full font-medium"
                          :style="searchMeta.scrape_triggered ? 'background:rgba(245,158,11,0.15);color:var(--color-risk-medium-text)' : 'background:rgba(79,70,229,0.15);color:var(--color-primary)'"
                          x-text="searchMeta.scrape_triggered ? t('search.mode_intelligent') : t('search.mode_quick')"></span>
                    <span x-show="searchMeta.image_used" x-cloak class="inline-flex items-center gap-1 text-xs px-2 py-0.5 rounded-full" style="background:rgba(168,85,247,0.15);color:#9333ea">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                        <span x-text="t('search.visual_analysis')"></span>
                    </span>
                </div>
                <div class="flex items-center gap-2 ml-auto">
                    <span class="text-xs" style="color:var(--color-text-muted)" x-text="t('sort.label')"></span>
                    <select x-model="sortMode" @change="sortResults()"
                            class="text-sm rounded-lg px-2 py-1.5 pr-7 cursor-pointer focus:outline-none focus:ring-2 focus:ring-indigo-500"
                            style="border:1px solid var(--color-border-input);background:var(--color-bg-input);color:var(--color-text-secondary)">
                        <option value="risk_desc" x-text="t('sort.risk_desc')"></option>
                        <option value="risk_asc" x-text="t('sort.risk_asc')"></option>
                        <option value="date_desc" x-text="t('sort.date_desc')"></option>
                        <option value="date_asc" x-text="t('sort.date_asc')"></option>
                    </select>
                </div>
            </div>

            <!-- Bookmarklet tip (dismissible) -->
            <div id="bkm-tip" class="rounded-xl p-3 mb-3 flex items-start gap-3"
                 style="background:rgba(79,70,229,0.06);border:1px dashed rgba(79,70,229,0.3)"
                 x-init="if(localStorage.getItem('bkm_tip')==='1') $el.remove()">
                <div class="flex-1 min-w-0">
                    <div class="text-sm font-semibold mb-1" style="color:var(--color-primary)" x-text="t('bookmarklet.title')"></div>
                    <p class="text-xs mb-2" style="color:var(--color-text-secondary)" x-text="t('bookmarklet.description')"></p>
                    <div class="flex flex-wrap items-center gap-3">
                        <a :href="window.AppComponents.TURKPATENT_BOOKMARKLET"
                           @click.prevent="if(window.AppToast) window.AppToast.showToast(t('bookmarklet.drag_toast'), 'info')"
                           class="inline-flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-xs font-bold text-white cursor-grab active:cursor-grabbing select-none"
                           style="background:var(--color-primary)"
                           :title="t('bookmarklet.drag_hint')">
                            &#128278; <span x-text="t('bookmarklet.button_label')"></span>
                        </a>
                        <ol class="text-xs list-decimal list-inside space-y-0.5" style="color:var(--color-text-faint)">
                            <li x-text="t('bookmarklet.step1')"></li>
                            <li x-text="t('bookmarklet.step2')"></li>
                            <li x-text="t('bookmarklet.step3')"></li>
                        </ol>
                    </div>
                </div>
                <button @click="$el.closest('#bkm-tip').remove(); localStorage.setItem('bkm_tip', '1')"
                        class="flex-shrink-0 p-1 rounded hover:opacity-70" style="color:var(--color-text-faint)">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>

            <!-- Result cards (scrollable) -->
            <div class="relative">
                <div x-ref="resultsScroll" class="max-h-[520px] overflow-y-auto space-y-3 pr-1" style="scrollbar-width:thin;scroll-behavior:smooth">
                    <template x-for="(r, i) in sortedResults" :key="r.application_no || i">
                        <div class="rounded-xl overflow-hidden transition-all" style="background:var(--color-bg-card);border:1px solid var(--color-border);box-shadow:var(--shadow-card)">
                            <!-- Clickable header row -->
                            <div class="flex items-center gap-3 p-4 cursor-pointer" @click="expandedResult = (expandedResult === i ? null : i)">
                                <!-- Logo thumbnail -->
                                <div class="w-10 h-10 rounded-lg flex-shrink-0 flex items-center justify-center overflow-hidden"
                                     :class="r.image_url ? 'cursor-pointer hover:ring-2 hover:ring-[var(--color-primary)] transition-shadow' : ''"
                                     style="background:var(--color-bg-muted);border:1px solid var(--color-border)"
                                     @click.stop="if(r.image_url) lightboxImage = r.image_url">
                                    <template x-if="r.image_url || r.image_path">
                                        <img :src="r.image_url || r.image_path" class="w-full h-full object-contain" alt="" loading="lazy">
                                    </template>
                                    <template x-if="!r.image_url && !r.image_path">
                                        <svg class="w-5 h-5" style="color:var(--color-text-faint)" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                                    </template>
                                </div>
                                <!-- Name + meta -->
                                <div class="flex-1 min-w-0">
                                    <div class="font-semibold truncate" style="color:var(--color-text-primary)" x-text="r.trademark_name || r.name || '\u2014'"></div>
                                    <div class="flex flex-wrap gap-1.5 mt-1 text-xs" style="color:var(--color-text-muted)">
                                        <span x-show="r.application_no" x-text="'#' + r.application_no"></span>
                                        <span x-show="r.status" class="px-1.5 py-0.5 rounded-full font-medium" :style="'color:' + getStatusColor(r.status) + ';background:var(--color-bg-muted)'" x-text="t('landing.status_' + (r.status || '').toLowerCase()) || r.status"></span>
                                    </div>
                                </div>
                                <!-- Risk Badge + chevron -->
                                <div class="flex items-center gap-2 flex-shrink-0">
                                    <div x-show="getScore(r) != null" class="text-xs font-bold px-2.5 py-1 rounded-full"
                                         :style="'background:' + getRiskBg(getScore(r)) + ';color:' + getRiskColor(getScore(r))"
                                         x-text="Math.round(getScore(r) * 100) + '%'"></div>
                                    <svg class="w-4 h-4 transition-transform" :class="expandedResult === i ? 'rotate-180' : ''" style="color:var(--color-text-muted)" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                                </div>
                            </div>

                            <!-- Expandable detail section -->
                            <div x-show="expandedResult === i" x-collapse x-cloak>
                                <div class="px-4 pb-4 pt-0">
                                    <div class="h-px mb-3" style="background:var(--color-border)"></div>

                                    <!-- Score breakdown: 3 columns -->
                                    <div class="grid grid-cols-3 gap-2 mb-3">
                                        <div class="text-center p-2 rounded-lg" style="background:var(--color-bg-muted)">
                                            <div class="text-[10px] uppercase tracking-wide mb-1" style="color:var(--color-text-muted)" x-text="t('landing.detail_text')">Metin</div>
                                            <div class="text-sm font-bold" :style="'color:' + getRiskColor(Math.max(r.text_similarity || (r.scores && r.scores.text_similarity) || 0, r.phonetic_similarity || (r.scores && r.scores.phonetic_similarity) || 0))"
                                                 x-text="Math.round(Math.max(r.text_similarity || (r.scores && r.scores.text_similarity) || 0, r.phonetic_similarity || (r.scores && r.scores.phonetic_similarity) || 0) * 100) + '%'"></div>
                                        </div>
                                        <div class="text-center p-2 rounded-lg" style="background:var(--color-bg-muted)">
                                            <div class="text-[10px] uppercase tracking-wide mb-1" style="color:var(--color-text-muted)" x-text="t('landing.detail_visual')">Gorsel</div>
                                            <div class="text-sm font-bold" :style="'color:' + getRiskColor(r.visual_similarity || (r.scores && r.scores.visual_similarity) || 0)"
                                                 x-text="Math.round((r.visual_similarity || (r.scores && r.scores.visual_similarity) || 0) * 100) + '%'"></div>
                                        </div>
                                        <div class="text-center p-2 rounded-lg" style="background:var(--color-bg-muted)">
                                            <div class="text-[10px] uppercase tracking-wide mb-1" style="color:var(--color-text-muted)" x-text="t('landing.detail_translation')">Ceviri</div>
                                            <div class="text-sm font-bold" :style="'color:' + getRiskColor(r.translation_similarity || (r.scores && r.scores.translation_similarity) || 0)"
                                                 x-text="Math.round((r.translation_similarity || (r.scores && r.scores.translation_similarity) || 0) * 100) + '%'"></div>
                                        </div>
                                    </div>

                                    <!-- Detail fields -->
                                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-x-4 gap-y-1.5 text-xs">
                                        <div x-show="r.status" class="flex gap-1.5">
                                            <span style="color:var(--color-text-muted)" x-text="t('landing.detail_status') + ':'"></span>
                                            <span class="font-semibold" :style="'color:' + getStatusColor(r.status)" x-text="t('landing.status_' + (r.status || '').toLowerCase()) || r.status"></span>
                                        </div>
                                        <div x-show="(r.nice_classes && r.nice_classes.length) || (r.classes && r.classes.length)" class="flex gap-1.5">
                                            <span style="color:var(--color-text-muted)" x-text="t('landing.detail_classes') + ':'"></span>
                                            <span class="font-medium" style="color:var(--color-text-primary)" x-text="(r.nice_classes || r.classes || []).join(', ')"></span>
                                        </div>
                                        <div x-show="r.holder_name" class="flex gap-1.5 sm:col-span-2">
                                            <span class="shrink-0" style="color:var(--color-text-muted)" x-text="t('landing.detail_holder') + ':'"></span>
                                            <span class="font-medium truncate cursor-pointer hover:underline" style="color:var(--color-primary)"
                                                  @click.stop="loadPortfolio('holder', r.holder_tpe_client_id, r.holder_name)"
                                                  x-text="r.holder_name + (r.holder_tpe_client_id ? ' (' + r.holder_tpe_client_id + ')' : '')"></span>
                                        </div>
                                        <div x-show="r.attorney_name || r.attorney" class="flex gap-1.5 sm:col-span-2">
                                            <span class="shrink-0" style="color:var(--color-text-muted)" x-text="t('landing.detail_attorney') + ':'"></span>
                                            <span class="font-medium truncate cursor-pointer hover:underline" style="color:var(--color-primary)"
                                                  @click.stop="loadPortfolio('attorney', r.attorney_no, r.attorney_name || r.attorney)"
                                                  x-text="(r.attorney_name || r.attorney) + (r.attorney_no ? ' (' + r.attorney_no + ')' : '')"></span>
                                        </div>
                                        <div x-show="r.application_date" class="flex gap-1.5">
                                            <span style="color:var(--color-text-muted)" x-text="t('landing.detail_date') + ':'"></span>
                                            <span class="font-medium" style="color:var(--color-text-primary)" x-text="r.application_date"></span>
                                        </div>
                                        <div x-show="r.registration_no" class="flex gap-1.5">
                                            <span style="color:var(--color-text-muted)" x-text="t('landing.detail_reg_no') + ':'"></span>
                                            <span class="font-medium" style="color:var(--color-text-primary)" x-text="r.registration_no"></span>
                                        </div>
                                        <div x-show="r.name_tr && r.name_tr.toLowerCase() !== ((r.name || r.trademark_name || '')).toLowerCase()" class="flex gap-1.5">
                                            <span style="color:var(--color-text-muted)">TR:</span>
                                            <span class="font-medium" style="color:var(--color-text-primary)" x-text="r.name_tr"></span>
                                        </div>
                                        <!-- Extracted Goods: Yes/No -->
                                        <div class="flex gap-1.5 sm:col-span-2">
                                            <span class="shrink-0" style="color:var(--color-text-muted)" x-text="t('landing.detail_extracted_goods') + ':'"></span>
                                            <template x-if="r.has_extracted_goods && r.extracted_goods && r.extracted_goods.length > 0">
                                                <span class="font-medium cursor-pointer hover:underline"
                                                      style="color:var(--color-risk-critical-text)"
                                                      @click.stop="r._showGoods = !r._showGoods"
                                                      x-text="t('landing.detail_extracted_goods_yes') + ' (' + r.extracted_goods.length + ') \u25BE'"></span>
                                            </template>
                                            <template x-if="!r.has_extracted_goods || !r.extracted_goods || r.extracted_goods.length === 0">
                                                <span class="font-medium" style="color:var(--color-text-primary)" x-text="t('landing.detail_extracted_goods_no')"></span>
                                            </template>
                                        </div>
                                    </div>

                                    <!-- Extracted Goods detail list (expandable) -->
                                    <div x-show="r._showGoods && r.extracted_goods && r.extracted_goods.length > 0" x-collapse x-cloak class="mt-2">
                                        <div class="rounded-lg p-3 text-xs space-y-2 max-h-40 overflow-y-auto" style="background:var(--color-bg-muted);border:1px solid var(--color-border);scrollbar-width:thin">
                                            <template x-for="(g, gi) in r.extracted_goods" :key="gi">
                                                <div class="leading-relaxed" style="color:var(--color-text-secondary)" x-text="g.TEXT"></div>
                                            </template>
                                        </div>
                                    </div>

                                    <!-- Watchlist + Turkpatent link row -->
                                    <div class="flex flex-wrap items-center gap-2 mt-3">
                                        <!-- Watchlist button (first, matching landing page style) -->
                                        <button x-show="r.application_no" @click.stop="addToWatchlistFromResult(r)"
                                                class="inline-flex items-center gap-1.5 text-xs font-medium px-3 py-1.5 rounded-lg transition-colors"
                                                style="color:var(--color-risk-high-text);background:var(--color-risk-high-bg)">
                                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                                            <span x-text="t('watchlist.add_to_watchlist')"></span>
                                        </button>
                                        <!-- Turkpatent link: copy app number + open page + toast -->
                                        <button x-show="r.application_no"
                                           class="inline-flex items-center gap-1.5 text-xs font-medium px-3 py-1.5 rounded-lg transition-colors cursor-pointer"
                                           style="color:var(--color-primary);background:var(--color-primary-light)"
                                           @click.stop="navigator.clipboard.writeText(r.application_no); window.open('https://opts.turkpatent.gov.tr/trademark', '_blank'); if(window.AppToast) window.AppToast.showToast(t('holder.turkpatent_copied_toast'), 'success');">
                                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
                                            <span x-text="t('landing.view_on_turkpatent')">Turkpatent'te Gor</span>
                                        </button>
                                    </div>

                                    <!-- AI Studio CTA (risky) / Register CTA (safe) -->
                                    <template x-if="getScore(r) >= 0.70 && searchQuery.trim()">
                                        <div class="mt-2 pt-2" style="border-top:1px solid var(--color-border)">
                                            <button @click.stop="openStudioWithContext('name', { query: searchQuery.trim(), nice_classes: selectedClasses })"
                                                    class="text-xs text-purple-600 hover:text-purple-800 font-medium flex items-center gap-1 btn-press">
                                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                                                <span x-text="t('studio.risky_name_cta')"></span>
                                            </button>
                                            <button x-show="(r.visual_similarity || (r.scores && r.scores.visual_similarity) || 0) > 0.75"
                                                    @click.stop="openStudioWithContext('logo', { query: searchQuery.trim(), nice_classes: selectedClasses })"
                                                    class="text-xs text-purple-600 hover:text-purple-800 font-medium flex items-center gap-1 mt-1 btn-press">
                                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                                                <span x-text="t('studio.similar_logo_cta')"></span>
                                            </button>
                                        </div>
                                    </template>
                                    <template x-if="getScore(r) < 0.50 && searchQuery.trim()">
                                        <div class="mt-2 pt-2" style="border-top:1px solid var(--color-border)">
                                            <button @click.stop="window.open('https://online.turkpatent.gov.tr/trademark-search/pub/trademark_register', '_blank')"
                                                    class="text-xs text-green-600 hover:text-green-800 font-medium flex items-center gap-1 btn-press">
                                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                                                <span x-text="t('studio.safe_name_cta')"></span>
                                            </button>
                                            <button x-show="(r.visual_similarity || (r.scores && r.scores.visual_similarity) || 0) < 0.30"
                                                    @click.stop="window.open('https://online.turkpatent.gov.tr/trademark-search/pub/trademark_register', '_blank')"
                                                    class="text-xs text-green-600 hover:text-green-800 font-medium flex items-center gap-1 mt-1 btn-press">
                                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                                                <span x-text="t('studio.safe_logo_cta')"></span>
                                            </button>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>
            </div>

        </div>

        <!-- Old search results container (kept as hidden fallback, used by old code path) -->
        <div id="search-results" class="mt-4 hidden"></div>
    </div>
</div>

<!-- Image Lightbox -->
<div x-show="lightboxImage" x-cloak x-transition.opacity class="fixed inset-0 z-[60] flex items-center justify-center p-4" style="background:rgba(0,0,0,0.7)" @click="lightboxImage = ''">
    <img :src="lightboxImage" class="max-w-full max-h-[80vh] rounded-xl shadow-2xl object-contain" style="background:white" @click.stop>
    <button @click="lightboxImage = ''" class="absolute top-4 right-4 p-2 rounded-full text-white hover:opacity-80" style="background:rgba(0,0,0,0.5)">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>
</div>

<!-- Portfolio Modal (authenticated) -->
<div x-show="showPortfolio" x-transition.opacity class="fixed inset-0 z-[70] flex items-center justify-center p-4" style="background:rgba(0,0,0,0.5)" @click.self="closePortfolio()">
    <div class="w-full max-w-2xl rounded-2xl shadow-2xl max-h-[80vh] flex flex-col" style="background:var(--color-bg-card)" @click.stop>
        <!-- Header -->
        <div class="flex items-center justify-between p-4 border-b" style="border-color:var(--color-border)">
            <div class="min-w-0 flex-1">
                <div class="text-xs uppercase tracking-wide mb-0.5" style="color:var(--color-text-muted)"
                     x-text="portfolioType === 'holder' ? t('landing.detail_holder') : t('landing.detail_attorney')"></div>
                <h3 class="text-base font-semibold truncate" style="color:var(--color-text-primary)" x-text="portfolioName"></h3>
            </div>
            <button @click="closePortfolio()" class="p-1.5 rounded-lg hover:opacity-80 shrink-0 ml-3" style="color:var(--color-text-muted)">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
        </div>
        <!-- Loading -->
        <div x-show="portfolioLoading" class="flex items-center justify-center py-12">
            <svg class="animate-spin h-6 w-6" style="color:var(--color-primary)" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
        </div>
        <!-- Results -->
        <div x-show="!portfolioLoading" class="overflow-y-auto flex-1 p-4 space-y-2" style="scrollbar-width:thin">
            <div x-show="portfolioResults.length === 0" class="text-center py-8 text-sm" style="color:var(--color-text-muted)" x-text="t('search.no_results')"></div>
            <template x-for="(tm, idx) in portfolioResults" :key="idx">
                <div class="flex items-center gap-3 p-3 rounded-xl transition-colors" style="background:var(--color-bg-muted)">
                    <div class="w-10 h-10 rounded-lg flex items-center justify-center shrink-0 overflow-hidden" style="background:var(--color-bg-card);border:1px solid var(--color-border)">
                        <img x-show="tm.image_url || tm.image_path" :src="tm.image_url || tm.image_path" class="w-full h-full object-contain" alt="">
                        <svg x-show="!tm.image_url && !tm.image_path" class="w-5 h-5" style="color:var(--color-text-muted)" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg>
                    </div>
                    <div class="min-w-0 flex-1">
                        <div class="flex items-center gap-2">
                            <span class="text-sm font-semibold truncate" style="color:var(--color-text-primary)" x-text="tm.trademark_name || tm.name"></span>
                            <span x-show="tm.status" class="text-[10px] px-1.5 py-0.5 rounded-full shrink-0"
                                  :style="'background:' + (tm.status === 'Tescil' || tm.status === 'Registered' ? 'var(--color-risk-low-bg);color:var(--color-risk-low-text)' : 'var(--color-bg-card);color:var(--color-text-muted)')"
                                  x-text="tm.status"></span>
                        </div>
                        <div class="flex items-center gap-3 text-xs mt-0.5" style="color:var(--color-text-muted)">
                            <span x-show="tm.application_no" x-text="tm.application_no"></span>
                            <span x-show="(tm.nice_classes && tm.nice_classes.length) || (tm.classes && tm.classes.length)" x-text="'Sinif: ' + (tm.nice_classes || tm.classes || []).join(', ')"></span>
                            <span x-show="tm.application_date" x-text="tm.application_date"></span>
                        </div>
                    </div>
                    <button x-show="tm.application_no" class="shrink-0 p-1.5 rounded-lg hover:opacity-80 cursor-pointer" style="color:var(--color-primary)"
                       @click.stop="navigator.clipboard.writeText(tm.application_no); window.open('https://opts.turkpatent.gov.tr/trademark', '_blank'); if(window.AppToast) window.AppToast.showToast(t('holder.turkpatent_copied_toast'), 'success');"
                       :title="t('holder.turkpatent_hint')">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/></svg>
                    </button>
                </div>
            </template>
        </div>
        <!-- Footer: total count + watchlist + CSV -->
        <div x-show="!portfolioLoading && portfolioResults.length > 0" class="p-3 border-t flex items-center justify-between gap-2" style="border-color:var(--color-border)">
            <span class="text-xs shrink-0" style="color:var(--color-text-muted)" x-text="t('holder.total_trademarks_label', { count: portfolioTotalCount })"></span>
            <div class="flex items-center gap-2">
                <button @click="addPortfolioToWatchlist()"
                        :disabled="portfolioBulkAdding"
                        class="inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium rounded-lg transition-colors"
                        style="background:var(--color-primary);color:white">
                    <svg x-show="!portfolioBulkAdding" class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                    <svg x-show="portfolioBulkAdding" class="w-3.5 h-3.5 animate-spin" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/></svg>
                    <span x-text="t('holder.add_all_to_watchlist')"></span>
                </button>
                <button x-show="portfolioTotalCount > 5" @click="downloadPortfolioCsv()"
                        class="inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium rounded-lg transition-colors"
                        style="background:var(--color-bg-muted);color:var(--color-text-primary)">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg>
                    <span x-text="t('holder.download_csv')">CSV Indir</span>
                </button>
            </div>
        </div>
    </div>
</div>
