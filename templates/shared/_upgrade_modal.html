<!-- ============================================ -->
<!-- DYNAMIC UPGRADE MODAL                        -->
<!-- ============================================ -->
<div id="upgrade-modal" role="dialog" aria-modal="true"
    class="hidden fixed inset-0 flex items-center justify-center modal-mobile-fullscreen"
    style="background:var(--color-bg-overlay);z-index:calc(var(--z-modal) + 20)">
    <div class="bg-gray-900 rounded-2xl p-8 max-w-md w-full mx-4 border border-purple-500/30 shadow-2xl">
        <div class="text-center">
            <div class="w-20 h-20 bg-purple-500/20 rounded-full flex items-center justify-center mx-auto mb-4">
                <span class="text-4xl">&#x1f680;</span>
            </div>
            <div id="upgrade-modal-eyebrow"
                class="mb-2 text-xs font-semibold uppercase tracking-[0.35em] text-purple-300"
                x-text="t('upgrade.eyebrow')">Plan Upgrade</div>
            <h3 id="upgrade-modal-title" class="text-2xl font-bold text-white mb-2"
                x-text="t('upgrade.generic_title')">Choose the next plan for this feature</h3>
            <p id="upgrade-modal-description" class="text-gray-400 mb-6"
                x-text="t('upgrade.generic_description')">Your current plan has reached its limit or does not include this feature.</p>
            <div class="bg-gray-800/50 rounded-xl p-5 mb-6 border border-purple-500/20 text-left">
                <div class="flex items-center justify-between gap-3 mb-3">
                    <div id="upgrade-plan-name" class="text-purple-400 font-bold text-lg"
                        x-text="t('pricing.starter_name')">Starter</div>
                    <div id="upgrade-plan-badge"
                        class="rounded-full bg-purple-500/15 px-3 py-1 text-[11px] font-semibold uppercase tracking-[0.24em] text-purple-200"
                        x-text="t('upgrade.recommended_badge')">Recommended</div>
                </div>
                <div class="mb-4 flex items-end gap-2">
                    <div id="upgrade-plan-price" class="text-3xl font-bold text-white">&#8378;499</div>
                    <div id="upgrade-plan-period" class="text-sm text-gray-400">/ay</div>
                </div>
                <div class="mb-3 text-xs font-semibold uppercase tracking-[0.3em] text-gray-500"
                    x-text="t('checkout.includes')">Includes</div>
                <ul id="upgrade-feature-list" class="space-y-2 text-sm text-gray-300">
                    <li class="flex items-center gap-2">
                        <span class="text-green-400">&#x2713;</span>
                        <span x-text="t('pricing.f_daily_searches', {n: 50})">50 searches/day</span>
                    </li>
                    <li class="flex items-center gap-2">
                        <span class="text-green-400">&#x2713;</span>
                        <span x-text="t('pricing.f_watchlist', {n: 15})">15 watchlist items</span>
                    </li>
                    <li class="flex items-center gap-2">
                        <span class="text-green-400">&#x2713;</span>
                        <span x-text="t('pricing.f_live_monthly', {n: 10})">10 Agentic Searches/month</span>
                    </li>
                </ul>
                <span id="upgrade-plan-code" class="sr-only">starter</span>
            </div>
            <div class="flex gap-3">
                <button id="upgrade-later-button" onclick="hideUpgradeModal()"
                    class="flex-1 px-4 py-3 bg-gray-700 text-white rounded-xl hover:bg-gray-600 transition-colors btn-press min-h-[48px]"
                    x-text="t('upgrade.maybe_later')">Maybe Later</button>
                <button id="upgrade-cta-button" onclick="redirectToUpgrade()"
                    class="flex-1 px-4 py-3 bg-gradient-to-r from-purple-500 to-pink-500 text-white rounded-xl hover:from-purple-600 hover:to-pink-600 transition-all font-semibold btn-press min-h-[48px]"
                    x-text="t('upgrade.upgrade_button')">Upgrade</button>
            </div>
        </div>
    </div>
</div>
